            function clearHighlights() {
                document.querySelectorAll('.valid-move, .valid-attack').forEach(el => {
                    el.classList.remove('valid-move', 'valid-attack');
                });
            }

            function showValidMoves(piece) {
                clearHighlights();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (r === piece.r && c === piece.c) continue;
                        
                        let targetPiece = pieces.find(p => p.r === r && p.c === c && !p.isDead && p.carriedBy == null);
                        let isAttack = targetPiece && targetPiece.player !== piece.player;
                        
                        if (isValidAction(piece, r, c, isAttack, null)) {
                            if (isAttack) {
                                cells[r][c].classList.add('valid-attack');
                            } else if (!targetPiece || (['Tàu', 'Xe', 'Mã', 'Tháp'].includes(targetPiece.type) && targetPiece.player === piece.player)) {
                                cells[r][c].classList.add('valid-move');
                            }
                        }
                    }
                }
            }

            function hasPieceAt(r, c) {
                return pieces.some(p => p.r === r && p.c === c && !p.isDead && !p.carriedBy);
            }

            function isPathClear(piece, r1, c1, r2, c2) {
                let absR = Math.abs(r2 - r1), absC = Math.abs(c2 - c1);
                if (absR !== 0 && absC !== 0 && absR !== absC) return true; 

                let dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1);
                let currR = r1 + dr, currC = c1 + dc;
                let counter = 0; 
                while ((currR !== r2 || currC !== c2) && counter < 50) {
                    if (pieces.some(p => p.r === currR && p.c === currC && !p.isDead && !p.carriedBy)) return false;
                    currR += dr; currC += dc; counter++;
                }
                return true;
            }

            function isWrapPathClear(r1, c1, r2, c2, wrapDc, isOceanWrap = false) {
                let absR = Math.abs(r2 - r1);
                let absC = Math.abs(wrapDc);
                if (absR !== 0 && absC !== 0 && absR !== absC) return true; 

                let dr = Math.sign(r2 - r1);
                let stepC = Math.sign(wrapDc); 
                
                let currR = r1 + dr;
                
                function getNextC(c, step) {
                    if (isOceanWrap) {
                        return (c + step + 28) % 28;
                    } else {
                        let nc = c + step;
                        if (nc < 3 && step < 0) return 24 + (nc - 2); 
                        if (nc > 24 && step > 0) return 3 + (nc - 25); 
                        return nc;
                    }
                }

                let currC = getNextC(c1, stepC);
                let steps = Math.max(absR, absC);

                for (let i = 1; i < steps; i++) {
                    if (hasPieceAt(currR, currC)) return false;
                    currR += dr;
                    currC = getNextC(currC, stepC);
                }
                return true;
            }

            function countObstacles(r1, c1, r2, c2, wrapDc = null, isOceanWrap = false) {
                let absR = Math.abs(r2 - r1);
                let dc = wrapDc !== null ? wrapDc : (c2 - c1);
                let absC = Math.abs(dc);
                if (absR !== 0 && absC !== 0 && absR !== absC) return 0; 

                let dr = Math.sign(r2 - r1);
                let stepC = Math.sign(dc);
                
                function getNextC(c, step) {
                    if (wrapDc === null) return c + step;
                    if (isOceanWrap) return (c + step + 28) % 28;
                    let nc = c + step;
                    if (nc < 3 && step < 0) return 24 + (nc - 2); 
                    if (nc > 24 && step > 0) return 3 + (nc - 25); 
                    return nc;
                }

                let currR = r1 + dr;
                let currC = getNextC(c1, stepC);
                let count = 0;
                let steps = Math.max(absR, absC);
                
                for (let i = 1; i < steps; i++) {
                    if (hasPieceAt(currR, currC)) count++;
                    currR += dr;
                    currC = getNextC(currC, stepC);
                }
                return count;
            }

            function canIlluminate(sourceR, sourceC, targetR, targetC) {
                let isSourceForest = mapData[sourceR][sourceC] === 'forest';
                let isTargetForest = mapData[targetR][targetC] === 'forest';
                if (!isSourceForest && isTargetForest) return false;
                return true;
            }

            function calculateVisionMatrix(player) {
                let grid = Array(ROWS).fill().map(() => Array(COLS).fill(false));
                let stealthGrid = Array(ROWS).fill().map(() => Array(COLS).fill(false));
                
                if (player === 'p1') {
                    for (let r = 24; r < ROWS; r++) { for (let c = 0; c < COLS; c++) { grid[r][c] = true; stealthGrid[r][c] = true; } }
                } else if (player === 'p2') {
                    for (let r = 0; r <= 5; r++) { for (let c = 0; c < COLS; c++) { grid[r][c] = true; stealthGrid[r][c] = true; } }
                }

                deadVisions.forEach(dv => {
                    if (dv.player === player) {
                        for (let dr = -dv.radius; dr <= dv.radius; dr++) {
                            for (let dc = -dv.radius; dc <= dv.radius; dc++) {
                                let nr = dv.r + dr, nc = dv.c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (canIlluminate(dv.r, dv.c, nr, nc)) {
                                        grid[nr][nc] = true;
                                        stealthGrid[nr][nc] = true;
                                    }
                                }
                            }
                        }
                    }
                });

                let myPieces = pieces.filter(p => p.player === player && !p.isDead);
                
                myPieces.forEach(p => {
                    if (p.type === 'Tháp') {
                        for (let dr = -3; dr <= 3; dr++) { 
                            for (let dc = -3; dc <= 3; dc++) { 
                                let nr = p.r + dr, nc = p.c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    grid[nr][nc] = true;
                                    stealthGrid[nr][nc] = true;
                                }
                            }
                        }
                        return; 
                    }

                    let isPieceInForest = mapData[p.r][p.c] === 'forest';
                    let isCarriedByThap = p.carriedBy && pieces.find(t => t.id === p.carriedBy).type === 'Tháp';

                    if (['Xe', 'Hậu', 'Tượng'].includes(p.type)) {
                        let maxDist = 8;
                        if (isPieceInForest) {
                            if (p.type === 'Xe') maxDist = 2; 
                            if (p.type === 'Hậu') maxDist = 3; 
                            if (p.type === 'Tượng') maxDist = 1; 
                        }

                        let dirs = [];
                        if (p.type === 'Xe' || p.type === 'Hậu') dirs.push([-1,0], [1,0], [0,-1], [0,1]);
                        if (p.type === 'Tượng' || p.type === 'Hậu') dirs.push([-1,-1], [-1,1], [1,-1], [1,1]);
                        
                        grid[p.r][p.c] = true;
                        stealthGrid[p.r][p.c] = true;

                        dirs.forEach(([dr, dc]) => {
                            for (let i = 1; i <= maxDist; i++) {
                                let nr = p.r + dr * i, nc = p.c + dc * i;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (mapData[nr][nc] === 'forest' && !isPieceInForest) break; 
                                    grid[nr][nc] = true;
                                    stealthGrid[nr][nc] = true;
                                    if (hasPieceAt(nr, nc)) break; 
                                } else break;
                            }
                        });
                    } else {
                        let v = p.vision || 0;
                        if (p.type === 'Tốt' && isPieceInForest) v = 4;

                        if (isCarriedByThap) {
                            if (p.type === 'ĐạiBàng') v = 9;
                            if (p.type === 'BắnĐá') v = 6;
                        }

                        let isWrapPiece = ['Tốt', 'Mã'].includes(p.type);
                        let isOceanPiece = p.type === 'Tàu' || p.type === 'BắnĐá' || p.type === 'ĐạiBàng' || mapData[p.r][p.c] === 'ocean';

                        for (let dr = -v; dr <= v; dr++) {
                            for (let dc = -v; dc <= v; dc++) {
                                let nr = p.r + dr;
                                let origNc = p.c + dc;
                                let nc = origNc;

                                if (isWrapPiece && isPieceInForest) {
                                    if (origNc < 3 && dc < 0) nc = 24 + (origNc - 2);
                                    else if (origNc > 24 && dc > 0) nc = 3 + (origNc - 25);
                                    
                                    if (nc !== origNc) {
                                        if (nr < 0 || nr >= ROWS || mapData[nr][nc] !== 'forest') {
                                            nc = origNc; 
                                        }
                                    }
                                } else if (isOceanPiece) {
                                    if (origNc < 0) nc = origNc + 28;
                                    else if (origNc >= COLS) nc = origNc - 28;
                                }

                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (Math.max(Math.abs(dr), Math.abs(dc)) <= v) {
                                        if (canIlluminate(p.r, p.c, nr, nc)) {
                                            grid[nr][nc] = true;
                                            if (nc === origNc || isOceanPiece) {
                                                stealthGrid[nr][nc] = true;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                });

                let livingEagles = pieces.filter(p => p.type === 'ĐạiBàng' && !p.isDead);
                if (livingEagles.length === 0) {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (mapData[r][c] !== 'forest') {
                                grid[r][c] = true;
                            }
                        }
                    }
                }

                return { grid, stealthGrid };
            }

            function hasAnyValidMove(piece) {
                for(let r=0; r<ROWS; r++){
                    for(let c=0; c<COLS; c++){
                        if(r===piece.r && c===piece.c) continue;
                        let targetPiece = pieces.find(p => p.r === r && p.c === c && !p.isDead && p.carriedBy == null);
                        let isAttack = targetPiece && targetPiece.player !== piece.player;
                        if(isValidAction(piece, r, c, isAttack, null)) return true;
                    }
                }
                return false;
            }

            function isValidAction(piece, targetR, targetC, isAttack, botVisionGrid = null) {
                let dr = targetR - piece.r;
                let dc = targetC - piece.c;
                let absR = Math.abs(dr);
                let absC = Math.abs(dc);
                let terrain = mapData[targetR][targetC];
                let forward = piece.player === 'p1' ? -1 : 1;
                
                let targetFriendlyObj = pieces.find(p => p.r === targetR && p.c === targetC && p.player === piece.player && !p.isDead && !p.carriedBy);
                let actualTargetEnemy = pieces.find(p => p.r === targetR && p.c === targetC && !p.isDead && p.carriedBy == null);

                if (piece.canDisembark) {
                    return Math.max(absR, absC) <= 1 && terrain !== 'ocean' && terrain !== 'river' && !targetFriendlyObj && !actualTargetEnemy;
                }

                let isWrapMove = false;
                let isOceanWrapMove = false;
                let effectiveAbsC = absC;
                let effectiveDc = dc;

                let inForest = mapData[piece.r][piece.c] === 'forest';
                let targetInForest = terrain === 'forest';

                if (['Tốt', 'Mã'].includes(piece.type) && inForest && targetInForest) {
                    let wrapDc1 = dc + 22; let wrapDc2 = dc - 22;
                    if (Math.abs(wrapDc1) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc1); effectiveDc = wrapDc1; isWrapMove = true;
                    } else if (Math.abs(wrapDc2) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc2); effectiveDc = wrapDc2; isWrapMove = true;
                    }
                } 
                else if (['Tàu', 'BắnĐá', 'ĐạiBàng'].includes(piece.type)) {
                    let wrapDc1 = dc + 28; let wrapDc2 = dc - 28;
                    if (Math.abs(wrapDc1) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc1); effectiveDc = wrapDc1; isWrapMove = true; isOceanWrapMove = true;
                    } else if (Math.abs(wrapDc2) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc2); effectiveDc = wrapDc2; isWrapMove = true; isOceanWrapMove = true;
                    }
                }

                let isWater = (terrain === 'ocean' || terrain === 'river');
                let isShoreAttack = false;
                // FIX LỖI CRASH Ở ĐÂY: Dùng actualTargetEnemy thay vì targetPiece bị undefine
                if (isAttack && actualTargetEnemy && actualTargetEnemy.type === 'Tàu' && ['ocean', 'river'].includes(mapData[actualTargetEnemy.r][actualTargetEnemy.c])) {
                    if (!['Tàu', 'ĐạiBàng', 'BắnĐá'].includes(piece.type)) {
                        if (Math.max(absR, effectiveAbsC) === 1) {
                            isShoreAttack = true; 
                        }
                    }
                }

                let isBoardingFromDistance = false;
                let isBishopInTower = piece.type === 'Tượng' && piece.carriedBy && pieces.find(p => p.id === piece.carriedBy).type === 'Tháp';

                if (!isAttack && actualTargetEnemy && actualTargetEnemy.player !== piece.player) return false; 
                if (!isAttack && targetFriendlyObj) {
                    if (isBishopInTower && targetFriendlyObj.type !== 'Tháp') return true; 
                    if (['Tàu', 'Xe', 'Mã', 'Tháp'].includes(targetFriendlyObj.type)) {
                        if (piece.type === 'Tháp') return false; 
                        let isFull = pieces.some(p => p.carriedBy === targetFriendlyObj.id && !p.isDead);
                        if (isFull) return false;
                        if (Math.max(absR, effectiveAbsC) <= 1) return true; 
                        isBoardingFromDistance = true; 
                    } else return false; 
                }
                if (piece.type === 'Tháp') return false; 
                
                // Chặn Quân Bờ xuống nước
                if (!isBoardingFromDistance) {
                    if (piece.type === 'Tàu' && !isWater && terrain !== 'port' && !isAttack) return false;
                    if (piece.type !== 'Tàu' && piece.type !== 'ĐạiBàng' && isWater) {
                        if (!(piece.type === 'BắnĐá' && isAttack) && !isShoreAttack) {
                            return false;
                        }
                    }
                }

                if ((piece.type === 'ĐạiBàng' || piece.type === 'BắnĐá') && terrain === 'forest' && !(isBoardingFromDistance && targetFriendlyObj && targetFriendlyObj.type==='Tháp')) {
                    return false;
                }

                let isLineMove = (absR === 0 || effectiveAbsC === 0 || absR === effectiveAbsC);
                
                let isWaterBlocked = false;
                if (!['ĐạiBàng', 'Tàu'].includes(piece.type) && !(piece.type === 'BắnĐá' && isAttack)) {
                    if (isWater && !isBoardingFromDistance && !isShoreAttack) {
                        isWaterBlocked = true; 
                    }
                    
                    if (!isWaterBlocked && isLineMove) {
                        let sdr = Math.sign(dr), sdc = Math.sign(effectiveDc);
                        let cr = piece.r + sdr, cc = piece.c;
                        function getNextCol(c, step) {
                             if(isOceanWrapMove) return (c + step + 28) % 28;
                             if(isWrapMove) {
                                 let nc = c + step;
                                 if (nc < 3 && step < 0) return 24 + (nc - 2); 
                                 if (nc > 24 && step > 0) return 3 + (nc - 25); 
                                 return nc;
                             }
                             return c + step;
                        }
                        cc = getNextCol(cc, sdc);
                        let steps = Math.max(absR, effectiveAbsC);
                        for(let i = 1; i < steps; i++) {
                            let pathTerrain = mapData[cr][cc];
                            if (pathTerrain === 'river' || pathTerrain === 'ocean') { isWaterBlocked = true; break; }
                            cr += sdr; cc = getNextCol(cc, sdc);
                        }
                    }
                }
                if (isWaterBlocked) return false; 

                let pathClearCheck = true;
                if (!['ĐạiBàng', 'BắnĐá', 'Mã', 'Tàu'].includes(piece.type)) {
                    let startHill = mapData[piece.r][piece.c] === 'hill';
                    let endHill = terrain === 'hill';
                    if (startHill !== endHill && Math.max(absR, effectiveAbsC) > 1) return false;
                    
                    if (isLineMove && Math.max(absR, effectiveAbsC) > 1 && !isWrapMove && !isBoardingFromDistance) {
                        let sdr = Math.sign(dr), sdc = Math.sign(effectiveDc);
                        let cr = piece.r + sdr, cc = piece.c + sdc;
                        let steps = 0;
                        while ((cr !== targetR || cc !== targetC) && steps < 30) {
                            if (mapData[cr][cc] === 'hill' !== startHill) return false;
                            cr += sdr; cc += sdc; steps++;
                        }
                    }
                }

                if (isBoardingFromDistance) pathClearCheck = isPathClear(piece, piece.r, piece.c, targetR, targetC);
                else if (isWrapMove) pathClearCheck = isWrapPathClear(piece.r, piece.c, targetR, targetC, effectiveDc, isOceanWrapMove);
                else if (isLineMove) pathClearCheck = isPathClear(piece, piece.r, piece.c, targetR, targetC);

                switch (piece.type) {
                    case 'Vua': return absR <= 1 && effectiveAbsC <= 1;
                    
                    case 'Tốt': 
                        let isPastRiver = piece.player === 'p1' ? piece.r <= 14 : piece.r >= 15;
                        let inForestPos = mapData[piece.r][piece.c] === 'forest';
                        
                        if (inForestPos) {
                            if (isAttack) {
                                let canDiag = absR === effectiveAbsC && absR <= 4;
                                let canHorizVert = (absR === 0 && effectiveAbsC <= 4) || (effectiveAbsC === 0 && absR <= 4);
                                return (canDiag || canHorizVert) && pathClearCheck;
                            } else {
                                return ((absR === 0 && effectiveAbsC <= 4) || (effectiveAbsC === 0 && absR <= 4)) && pathClearCheck;
                            }
                        } else {
                            if (isAttack) {
                                if (isPastRiver) {
                                    let canDiag = absR === effectiveAbsC && absR <= 2 && (dr * forward > 0);
                                    let canHoriz = absR === 0 && effectiveAbsC <= 2;
                                    return (canDiag || canHoriz) && pathClearCheck;
                                } else {
                                    return absR === effectiveAbsC && absR <= 2 && (dr * forward > 0) && pathClearCheck;
                                }
                            } else {
                                let maxDist = piece.hasMoved ? 3 : 5;
                                if (isPastRiver) {
                                    let horizDist = 2;
                                    return ((effectiveDc === 0 && (dr * forward > 0) && absR <= maxDist) || (dr === 0 && effectiveAbsC <= horizDist)) && pathClearCheck;
                                } else {
                                    return effectiveDc === 0 && (dr * forward > 0) && absR <= maxDist && pathClearCheck;
                                }
                            }
                        }
                    
                    case 'Hậu': 
                        let hauLimit = mapData[piece.r][piece.c] === 'forest' ? 3 : 8;
                        return isLineMove && Math.max(absR, effectiveAbsC) <= hauLimit && pathClearCheck;
                    case 'Xe': 
                        let xeLimit = mapData[piece.r][piece.c] === 'forest' ? 2 : 8;
                        return (absR === 0 || effectiveAbsC === 0) && Math.max(absR, effectiveAbsC) <= xeLimit && pathClearCheck;
                    case 'Tượng': 
                        let tuongLimit = mapData[piece.r][piece.c] === 'forest' ? 1 : 8;
                        return (absR === effectiveAbsC) && absR <= tuongLimit && pathClearCheck;
                    case 'Mã': 
                        return (absR === 2 && effectiveAbsC === 1) || (absR === 1 && effectiveAbsC === 2);
                    
                    case 'ĐạiBàng':
                        if (isAttack) return absR <= 1 && effectiveAbsC <= 1; 
                        else return Math.max(absR, effectiveAbsC) <= 7; 
                    
                    case 'BắnĐá':
                        if (!isLineMove) return false; 
                        if (piece.player === 'p1' && dr > 0) return false; 
                        if (piece.player === 'p2' && dr < 0) return false; 

                        if (isAttack) {
                            let canSee = piece.player === localPlayerRole ? cells[targetR][targetC].classList.contains('visible') : (botVisionGrid ? botVisionGrid[targetR][targetC] : false);
                            if (!canSee || Math.max(absR, effectiveAbsC) > 10) return false; 
                            
                            let obsCount = countObstacles(piece.r, piece.c, targetR, targetC, isWrapMove ? effectiveDc : null, isOceanWrapMove);
                            let isOnHill = mapData[piece.r][piece.c] === 'hill';
                            
                            if (obsCount === 0) return true; 
                            if (obsCount === 1 && isOnHill) return true; 
                            return false; 
                        } else {
                            return Math.max(absR, effectiveAbsC) <= 3 && pathClearCheck;
                        }
                    
                    case 'Tàu':
                        if (!isLineMove) return false; 
                        let distance = Math.max(absR, effectiveAbsC);
                        if (isAttack) {
                            return distance <= 4 && pathClearCheck;
                        } else {
                            if (effectiveAbsC === 0) {
                                return distance <= 8 && pathClearCheck;
                            } else {
                                return distance <= 2 && pathClearCheck;
                            }
                        }
                }
                
                return false;
            }

            function showExplosion(r, c) {
                let boom = document.createElement('div');
                boom.className = 'boom';
                cells[r][c].appendChild(boom);
                setTimeout(() => boom.remove(), 500);
            }

            function showPromotionUI(piece) {
                let overlay = document.createElement('div');
                overlay.id = 'promo-overlay';
                overlay.innerHTML = `
                    <div id="promo-box">
                        <h3>🎖️ PHONG CẤP TỐT 🎖️</h3>
                        <p>Hãy chọn quyền lực mới:</p>
                        <div class="promo-btn-container">
                            <button class="promo-btn" data-type="Hậu" data-icon="♕" data-vision="8"><span class="promo-icon">♕</span> Hậu</button>
                            <button class="promo-btn" data-type="Xe" data-icon="♖" data-vision="8"><span class="promo-icon">♖</span> Xe</button>
                            <button class="promo-btn" data-type="Mã" data-icon="♘" data-vision="3"><span class="promo-icon">♘</span> Mã</button>
                            <button class="promo-btn" data-type="Tượng" data-icon="♗" data-vision="8"><span class="promo-icon">♗</span> Tượng</button>
                            <button class="promo-btn" data-type="ĐạiBàng" data-icon="🦅" data-vision="3"><span class="promo-icon">🦅</span> Đại Bàng</button>
                            <button class="promo-btn" data-type="BắnĐá" data-icon="🎯" data-vision="2"><span class="promo-icon">🎯</span> Bắn Đá</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                document.querySelectorAll('.promo-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        let targetBtn = e.target.closest('.promo-btn');
                        piece.type = targetBtn.dataset.type;
                        piece.icon = targetBtn.dataset.icon;
                        piece.vision = parseInt(targetBtn.dataset.vision);
                        
                        document.getElementById('promo-overlay').remove();
                        renderPieces();
                        finalizeTurn(piece);
                    });
                });
            }

            function killPieceAndPassengers(pieceId) {
                let p = pieces.find(x => x.id === pieceId);
                if (p && !p.isDead) {
                    p.isDead = true;
                    let passengers = pieces.filter(x => x.carriedBy === pieceId && !x.isDead);
                    passengers.forEach(pass => killPieceAndPassengers(pass.id));
                }
            }
            
            function movePieceAndPassengers(pieceId, newR, newC) {
                let p = pieces.find(x => x.id === pieceId);
                if (p && !p.isDead) {
                    p.r = newR;
                    p.c = newC;
                    let passengers = pieces.filter(x => x.carriedBy === pieceId && !x.isDead);
                    passengers.forEach(pass => movePieceAndPassengers(pass.id, newR, newC));
                }
            }

            function showPieceSelector(piecesInCell, r, c) {
                let menu = document.getElementById('piece-selector-menu');
                if (!menu) {
                    menu = document.createElement('div');
                    menu.id = 'piece-selector-menu';
                    document.body.appendChild(menu);
                }
                menu.innerHTML = ''; 
                
                let header = document.createElement('div');
                header.innerText = 'CHỌN QUÂN:';
                header.style.cssText = 'color: #f1c40f; font-size: 12px; text-align: center; margin-bottom: 2px; border-bottom: 1px solid #7f8c8d; padding-bottom: 4px;';
                menu.appendChild(header);

                menu.style.display = 'flex';
                
                let cellEl = cells[r][c];
                let rect = cellEl.getBoundingClientRect();
                
                let menuX = rect.right + 10;
                let menuY = rect.top;
                
                menu.style.left = menuX + 'px';
                menu.style.top = menuY + 'px';

                piecesInCell.forEach(p => {
                    let btn = document.createElement('button');
                    btn.className = 'selector-btn';
                    btn.innerHTML = `<span style="font-size: 24px;">${p.icon}</span> <span>${p.type}</span>`;
                    
                    btn.onclick = (e) => {
                        menu.style.display = 'none';
                        selectedPieceId = p.id;
                        renderPieces();
                        updateVision();
                        showValidMoves(p);
                    };
                    menu.appendChild(btn);
                });

                setTimeout(() => {
                    let mRect = menu.getBoundingClientRect();
                    if (mRect.right > window.innerWidth) {
                        menu.style.left = (rect.left - mRect.width - 10) + 'px'; 
                    }
                    if (mRect.bottom > window.innerHeight) {
                        menu.style.top = (window.innerHeight - mRect.height - 10) + 'px'; 
                    }
                }, 0);
            }

            document.addEventListener('click', (e) => {
                let menu = document.getElementById('piece-selector-menu');
                if (menu && menu.style.display === 'flex' && !menu.contains(e.target) && !e.target.closest('.cell')) {
                    menu.style.display = 'none';
                }
            });

            function handleCellClick(e, r, c) {
                if (isReplaying || isGameOver || document.getElementById('promo-overlay')) return; 
                if (currentTurn !== localPlayerRole) return;

                let menu = document.getElementById('piece-selector-menu');
                if (menu && menu.style.display === 'flex') {
                    menu.style.display = 'none'; 
                }

                let myPiecesAtCell = pieces.filter(p => p.r === r && p.c === c && p.player === localPlayerRole && !p.isDead);
                let enemyPiecesAtCell = pieces.filter(p => p.r === r && p.c === c && p.player !== localPlayerRole && !p.isDead);
                let currentSelected = pieces.find(p => p.id === selectedPieceId);

                if (currentSelected && (r !== currentSelected.r || c !== currentSelected.c) && (myPiecesAtCell.length === 0 || myPiecesAtCell.some(p => ['Tàu', 'Xe', 'Mã', 'Tháp'].includes(p.type)))) {
                    let isAttack = enemyPiecesAtCell.length > 0;
                    let targetEnemy = enemyPiecesAtCell.find(p => p.carriedBy == null) || enemyPiecesAtCell[0]; 
                    let targetFriendly = myPiecesAtCell.find(p => ['Tàu', 'Xe', 'Mã', 'Tháp'].includes(p.type) && p.id !== currentSelected.id);

                    if (isAttack && isValidAction(currentSelected, r, c, true)) {
                        executeMove(currentSelected, r, c, true, targetEnemy);
                        return;
                    } else if (!isAttack && targetFriendly && isValidAction(currentSelected, r, c, false)) {
                        executeMove(currentSelected, r, c, false, targetFriendly);
                        return;
                    } else if (!isAttack && myPiecesAtCell.length === 0 && isValidAction(currentSelected, r, c, false)) {
                         executeMove(currentSelected, r, c, false, null);
                         return;
                    }
                }

                if (myPiecesAtCell.length > 0) {
                    if (lockedPieceId) {
                        let lockedP = myPiecesAtCell.find(p => p.id === lockedPieceId);
                        if (lockedP) {
                             lockedP.extraMoveUsed = false;
                             lockedP.canDisembark = false;
                             lockedPieceId = null;
                             selectedPieceId = null;
                             currentTurn = currentTurn === 'p1' ? 'p2' : 'p1';
                             updateTurnUI();
                             saveCurrentState();
                             syncGameToFirebase();
                             clearHighlights();
                             renderPieces();
                             updateVision();
                             if (gameMode === 'pve' && currentTurn !== localPlayerRole) setTimeout(() => playBotAI(), 800);
                        }
                        return; 
                    }

                    if (myPiecesAtCell.length >= 3) {
                        showPieceSelector(myPiecesAtCell, r, c);
                    } else if (myPiecesAtCell.length === 2) {
                        let clickedPieceEl = e.target.closest('.piece');
                        if (clickedPieceEl && clickedPieceEl.dataset.id) {
                            selectedPieceId = clickedPieceEl.dataset.id;
                        } else {
                            let carrier = myPiecesAtCell.find(p => !p.carriedBy);
                            selectedPieceId = carrier ? carrier.id : myPiecesAtCell[0].id;
                        }
                        renderPieces();
                        updateVision(); 
                        let selectedP = pieces.find(x => x.id === selectedPieceId);
                        if (selectedP) showValidMoves(selectedP); 
                    } else {
                        selectedPieceId = myPiecesAtCell[0].id;
                        renderPieces();
                        updateVision(); 
                        showValidMoves(myPiecesAtCell[0]); 
                    }
                } else {
                    if (!lockedPieceId) {
                        selectedPieceId = null;
                        clearHighlights();
                        renderPieces();
                        updateVision();
                    }
                }
            }

            function executeMove(movingPiece, r, c, isAttack, targetPiece) {
                if (movingPiece.canDisembark) {
                    clearHighlights();
                    movingPiece.hasMoved = true;
                    deadVisions.forEach(dv => { dv.turnsLeft--; });
                    deadVisions = deadVisions.filter(dv => dv.turnsLeft > 0);
                    
                    movingPiece.carriedBy = null;
                    movePieceAndPassengers(movingPiece.id, r, c);
                    movingPiece.canDisembark = false;
                    
                    selectedPieceId = null;
                    updateVision();
                    
                    let isPromoting = false;
                    if (movingPiece.type === 'Tốt') {
                        if (movingPiece.player === 'p1' && movingPiece.r === 0) isPromoting = true;
                        else if (movingPiece.player === 'p2' && movingPiece.r === ROWS - 1) isPromoting = true;
                    }
                    if (isPromoting && !isGameOver) {
                        if (movingPiece.player === localPlayerRole) {
                            showPromotionUI(movingPiece);
                            return; 
                        } else if (gameMode === 'pve') {
                            movingPiece.type = 'Hậu'; movingPiece.icon = '♛'; movingPiece.vision = 8;
                            finalizeTurn(movingPiece); return;
                        }
                    }
                    if (!isGameOver) finalizeTurn(movingPiece);
                    return;
                }

                clearHighlights(); 
                movingPiece.hasMoved = true;
                const transports = ['Tàu', 'Xe', 'Mã', 'Tháp'];

                deadVisions.forEach(dv => { dv.turnsLeft--; });
                deadVisions = deadVisions.filter(dv => dv.turnsLeft > 0);

                let isBishopInTower = movingPiece.type === 'Tượng' && movingPiece.carriedBy && pieces.find(p => p.id === movingPiece.carriedBy).type === 'Tháp';
                let isSwap = isBishopInTower && !isAttack && targetPiece && targetPiece.player === movingPiece.player && targetPiece.type !== 'Tháp' && targetPiece.id !== movingPiece.carriedBy;

                let triggerExplosion = false;
                let explosionR, explosionC;

                let isShoreAttack = false;
                if (isAttack && targetPiece && targetPiece.type === 'Tàu' && ['ocean', 'river'].includes(mapData[targetPiece.r][targetPiece.c])) {
                    if (!['Tàu', 'ĐạiBàng', 'BắnĐá'].includes(movingPiece.type)) {
                        if (Math.max(Math.abs(movingPiece.r - targetPiece.r), Math.abs(movingPiece.c - targetPiece.c)) === 1) {
                            isShoreAttack = true;
                        }
                    }
                }

                if (isSwap) {
                    let towerId = movingPiece.carriedBy;
                    let targetOldR = targetPiece.r;
                    let targetOldC = targetPiece.c;
                    let targetCarriedBy = targetPiece.carriedBy;
                    
                    targetPiece.r = movingPiece.r; 
                    targetPiece.c = movingPiece.c;
                    targetPiece.carriedBy = towerId;
                    
                    movingPiece.r = targetOldR;
                    movingPiece.c = targetOldC;
                    movingPiece.carriedBy = targetCarriedBy;
                    
                    let passenger = pieces.find(p => p.carriedBy === targetPiece.id && !p.isDead);
                    if (passenger) movePieceAndPassengers(passenger.id, targetPiece.r, targetPiece.c);
                    
                    let myPassenger = pieces.find(p => p.carriedBy === movingPiece.id && !p.isDead);
                    if (myPassenger) movePieceAndPassengers(myPassenger.id, movingPiece.r, movingPiece.c);
                }
                else if (!isAttack && targetPiece && transports.includes(targetPiece.type) && targetPiece.player === movingPiece.player) {
                    movingPiece.carriedBy = targetPiece.id;
                    movePieceAndPassengers(movingPiece.id, targetPiece.r, targetPiece.c);
                } else {
                    if (isAttack) {
                        let isExplosiveTower = false;
                        let passengerToDrop = null;

                        if (targetPiece.type === 'Tháp') {
                            let passenger = pieces.find(p => p.carriedBy === targetPiece.id && !p.isDead);
                            if (passenger) {
                                if (passenger.type === 'ĐạiBàng') {
                                    passengerToDrop = passenger; 
                                } else if (passenger.type === 'Tượng' || passenger.type === 'BắnĐá') {
                                    triggerExplosion = true; 
                                    explosionR = targetPiece.r;
                                    explosionC = targetPiece.c;
                                    isExplosiveTower = true;
                                }
                            }
                            if (!isExplosiveTower) destroyedTowers.push({ id: targetPiece.id, player: targetPiece.player, r: targetPiece.r, c: targetPiece.c });
                        }

                        killPieceAndPassengers(targetPiece.id);

                        if (passengerToDrop && passengerToDrop.type === 'ĐạiBàng') {
                             passengerToDrop.isDead = false; 
                             passengerToDrop.carriedBy = null;
                             let dropC = targetPiece.c < 14 ? targetPiece.c - 1 : targetPiece.c + 1;
                             passengerToDrop.r = targetPiece.r; passengerToDrop.c = dropC;
                             let occupant = pieces.find(p => p.r === passengerToDrop.r && p.c === passengerToDrop.c && !p.isDead && !p.carriedBy && p.id !== passengerToDrop.id);
                             if (occupant) killPieceAndPassengers(occupant.id);
                        }

                        showExplosion(r, c);

                        let radius = 0;
                        if (['ĐạiBàng', 'Hậu', 'Mã'].includes(targetPiece.type)) radius = 3; 
                        else if (['Xe', 'Tàu', 'Tượng'].includes(targetPiece.type)) radius = 2; 
                        if (mapData[r][c] === 'forest' && radius > 0) radius = radius === 3 ? 2 : 1;
                        if (radius > 0) deadVisions.push({ r: r, c: c, radius: radius, player: targetPiece.player, turnsLeft: 6 }); 

                        if (triggerExplosion) {
                            for (let er = explosionR - 1; er <= explosionR + 1; er++) {
                                for (let ec = explosionC - 1; ec <= explosionC + 1; ec++) {
                                    let victims = pieces.filter(p => p.r === er && p.c === ec && !p.isDead);
                                    victims.forEach(v => killPieceAndPassengers(v.id)); 
                                    if(er>=0 && er<ROWS && ec>=0 && ec<COLS) showExplosion(er, ec);
                                }
                            }
                        }

                        if (['BắnĐá', 'Tàu'].includes(movingPiece.type) || isShoreAttack) {
                             // Đứng yên
                        } else {
                            if (movingPiece.carriedBy) movingPiece.carriedBy = null; 
                            movePieceAndPassengers(movingPiece.id, r, c);
                        }
                    } else {
                        if (movingPiece.carriedBy) movingPiece.carriedBy = null; 
                        movePieceAndPassengers(movingPiece.id, r, c);
                    }
                }

                if (movingPiece.type === 'Hậu' && !movingPiece.carriedBy) {
                    let ruinIdx = destroyedTowers.findIndex(dt => dt.r === movingPiece.r && dt.c === movingPiece.c && dt.player === movingPiece.player);
                    if (ruinIdx !== -1) {
                        let revivedTower = pieces.find(p => p.id === destroyedTowers[ruinIdx].id);
                        if (revivedTower) {
                            revivedTower.isDead = false;
                            revivedTower.r = movingPiece.r;
                            revivedTower.c = movingPiece.c;
                            movingPiece.carriedBy = revivedTower.id; 
                        }
                        destroyedTowers.splice(ruinIdx, 1);
                    }
                }

                selectedPieceId = null;
                updateVision();

                let p1King = pieces.find(p => p.type === 'Vua' && p.player === 'p1');
                let p2King = pieces.find(p => p.type === 'Vua' && p.player === 'p2');
                if (p1King.isDead || p2King.isDead) {
                    isGameOver = true;
                    saveCurrentState();
                    updateVision();
                    syncGameToFirebase();
                    document.getElementById('btn-replay').style.display = 'block';
                    let won = (p2King.isDead && localPlayerRole === 'p1') || (p1King.isDead && localPlayerRole === 'p2');
                    setTimeout(() => alert(won ? '🎉 CHIẾN THẮNG! Bạn đã tiêu diệt Vua địch!' : '💀 BẠN ĐÃ THUA! Vua của bạn đã bị tiêu diệt.'), 300);
                    return;
                }

                let isPromoting = false;
                if (movingPiece.type === 'Tốt') {
                    if (movingPiece.player === 'p1' && movingPiece.r === 0) {
                        isPromoting = true;
                    } else if (movingPiece.player === 'p2' && movingPiece.r === ROWS - 1) {
                        isPromoting = true;
                    }
                }

                if (isPromoting && !isGameOver) {
                    if (movingPiece.player === localPlayerRole) {
                        showPromotionUI(movingPiece);
                        return; 
                    } else if (gameMode === 'pve') {
                        movingPiece.type = 'Hậu';
                        movingPiece.icon = '♛';
                        movingPiece.vision = 8;
                        finalizeTurn(movingPiece);
                        return;
                    }
                }

                if (!isGameOver) {
                    finalizeTurn(movingPiece);
                }
            }

            function finalizeTurn(movingPiece) {
                let hasExtraMove = false;
                
                if (movingPiece.type === 'Mã' && mapData[movingPiece.r][movingPiece.c] === 'forest' && !movingPiece.extraMoveUsed) {
                    if (hasAnyValidMove(movingPiece)) {
                        movingPiece.extraMoveUsed = true;
                        hasExtraMove = true;
                    }
                } else if (movingPiece.type === 'Tàu' && !movingPiece.extraMoveUsed) {
                    let passenger = pieces.find(p => p.carriedBy === movingPiece.id && !p.isDead);
                    if (passenger) {
                        let canDrop = false;
                        for(let dr = -1; dr <= 1; dr++) {
                            for(let dc = -1; dc <= 1; dc++) {
                                let nr = movingPiece.r + dr, nc = movingPiece.c + dc;
                                if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
                                    let t = mapData[nr][nc];
                                    if(t !== 'ocean' && t !== 'river' && !hasPieceAt(nr, nc)) canDrop = true;
                                }
                            }
                        }
                        if (canDrop) {
                            passenger.canDisembark = true;
                            passenger.extraMoveUsed = true;
                            hasExtraMove = true;
                            movingPiece = passenger;
                        }
                    }
                } else {
                    movingPiece.extraMoveUsed = false;
                    movingPiece.canDisembark = false;
                }

                if (hasExtraMove) {
                    lockedPieceId = movingPiece.id;
                    if (currentTurn === localPlayerRole) {
                        if (movingPiece.canDisembark) {
                            turnInd.innerText = 'CHỌN Ô ĐỂ XUỐNG TÀU (BẤM VÀO QUÂN ĐỂ HỦY)';
                        } else {
                            turnInd.innerText = 'MÃ ĐƯỢC ĐI THÊM 1 BƯỚC (BẤM VÀO MÃ ĐỂ HỦY)';
                        }
                        turnInd.style.backgroundColor = '#f39c12';
                        selectedPieceId = movingPiece.id; 
                        updateVision();
                        showValidMoves(movingPiece);
                    }
                    saveCurrentState();
                    syncGameToFirebase(); 
                    
                    if (gameMode === 'pve' && currentTurn !== localPlayerRole) {
                        setTimeout(() => playBotAI(movingPiece.id), 800);
                    }
                } else {
                    lockedPieceId = null;
                    pieces.filter(p => p.player === currentTurn).forEach(p => p.extraMoveUsed = false);
                    currentTurn = currentTurn === 'p1' ? 'p2' : 'p1';
                    
                    saveCurrentState();
                    updateTurnUI();
                    syncGameToFirebase(); 

                    if (gameMode === 'pve' && currentTurn !== localPlayerRole) {
                        setTimeout(() => playBotAI(), 800); 
                    }
                }
            }

            function playBotAI(forcedPieceId = null) {
                if (isGameOver || gameMode !== 'pve') return;
                
                let bots = pieces.filter(p => p.player === currentTurn && !p.isDead && !p.carriedBy && p.type !== 'Tháp');
                if (forcedPieceId) bots = bots.filter(p => p.id === forcedPieceId);
                
                let playerPs = pieces.filter(p => p.player === localPlayerRole && !p.isDead);
                let botVisionObj = calculateVisionMatrix(currentTurn);
                let botVision = botVisionObj.grid;
                let botStealth = botVisionObj.stealthGrid;
                let moves = [];

                bots.forEach(piece => {
                    let limit = (piece.type === 'BắnĐá' || piece.type === 'Xe') ? 10 : (piece.type === 'Tàu' ? 8 : 7);
                    
                    let inForest = mapData[piece.r][piece.c] === 'forest';
                    let canWrap = ['Tốt', 'Mã'].includes(piece.type) && inForest;
                    let isBishopInTower = piece.type === 'Tượng' && piece.carriedBy && pieces.find(p => p.id === piece.carriedBy).type === 'Tháp';

                    let minC = Math.max(0, piece.c - limit);
                    let maxC = Math.min(COLS - 1, piece.c + limit);
                    let minR = Math.max(0, piece.r - limit);
                    let maxR = Math.min(ROWS - 1, piece.r + limit);

                    if (canWrap || isBishopInTower) { minC = 0; maxC = COLS - 1; }
                    if (isBishopInTower) { minR = 0; maxR = ROWS - 1; }
                    
                    for (let r = minR; r <= maxR; r++) {
                        for (let c = minC; c <= maxC; c++) {
                            if (r === piece.r && c === piece.c) continue;

                            let target = pieces.find(p => p.r === r && p.c === c && !p.isDead);
                            let isA = target && target.player === localPlayerRole;

                            if (isA && ['Tốt', 'Mã'].includes(target.type) && mapData[target.r][target.c] === 'forest') {
                                if (!botStealth[target.r][target.c]) continue; 
                            }

                            if (target && target.player === currentTurn) {
                                if (isValidAction(piece, r, c, false, botVision)) {
                                    let score = 35;
                                    if (isBishopInTower && target.type !== 'Tháp') score += 25; 
                                    moves.push({ piece, r, c, targetPiece: target, score: score, isAttack: false });
                                }
                                continue;
                            }

                            if (isValidAction(piece, r, c, isA, botVision)) {
                                let score = isA ? (PIECE_VALUES[target.type] * 3) : (currentTurn==='p2'? r * 3 : (ROWS-r)*3);
                                
                                if (mapData[r][c] === 'hill' && (piece.type === 'BắnĐá' || piece.type === 'ĐạiBàng')) score += 60;
                                if (mapData[r][c] === 'forest' && (piece.type === 'Tốt' || piece.type === 'Mã')) score += 40;

                                if (piece.type === 'Hậu' && !isA) {
                                    let isRuin = destroyedTowers.some(dt => dt.r === r && dt.c === c && dt.player === piece.player);
                                    if (isRuin) score += 300; 
                                }

                                let isDanger = playerPs.some(pp => Math.max(Math.abs(pp.r - r), Math.abs(pp.c - c)) <= 10 && isValidAction(pp, r, c, true));
                                if (isDanger) score -= (PIECE_VALUES[piece.type] * 2);

                                moves.push({ piece, r, c, targetPiece: target, score, isAttack: isA });
                            }
                        }
                    }
                });

                bots.forEach(piece => {
                    if (playerPs.some(pp => Math.max(Math.abs(pp.r - piece.r), Math.abs(pp.c - piece.c)) <= 10 && isValidAction(pp, piece.r, piece.c, true))) {
                        if (PIECE_VALUES[piece.type] >= 100) {
                            moves.filter(m => m.piece.id === piece.id).forEach(m => m.score += 500);
                        }
                    }
                });

                if (moves.length > 0) {
                    moves.sort((a, b) => b.score - a.score);
                    let best = moves[0];
                    executeMove(best.piece, best.r, best.c, best.isAttack, best.targetPiece);
                } else {
                    if (forcedPieceId) {
                        let mp = pieces.find(p => p.id === forcedPieceId);
                        if(mp) { mp.extraMoveUsed = false; mp.canDisembark = false; }
                        lockedPieceId = null;
                        currentTurn = localPlayerRole;
                        updateTurnUI();
                        updateVision();
                        return;
                    }

                    currentTurn = localPlayerRole;
                    updateTurnUI();
                    updateVision();
                }
            }

            function updateVision() {
                document.querySelectorAll('.death-glow').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.check-glow').forEach(el => el.remove());

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (cells[r][c].classList.contains('visible')) {
                            cells[r][c].classList.remove('visible');
                            cells[r][c].classList.add('shrouded');
                        }
                    }
                }

                let myVisionObj = calculateVisionMatrix(localPlayerRole);
                let grid = myVisionObj.grid;
                let stealthGrid = myVisionObj.stealthGrid;

                let myKing = pieces.find(p => p.type === 'Vua' && p.player === localPlayerRole && !p.isDead);
                let allEnemies = pieces.filter(p => p.player !== localPlayerRole && !p.isDead);

                if (myKing) {
                    allEnemies.forEach(enemy => {
                        if (isValidAction(enemy, myKing.r, myKing.c, true, grid)) {
                            grid[enemy.r][enemy.c] = true;
                            stealthGrid[enemy.r][enemy.c] = true;
                            let cg = document.createElement('div');
                            cg.className = 'check-glow';
                            cells[enemy.r][enemy.c].appendChild(cg);

                            for (let r = 0; r < ROWS; r++) {
                                for (let c = 0; c < COLS; c++) {
                                    if (r === enemy.r && c === enemy.c) continue;
                                    let target = pieces.find(p => p.r === r && p.c === c && !p.isDead && p.carriedBy == null);
                                    let isAttack = target && target.player !== enemy.player;
                                    if (isValidAction(enemy, r, c, isAttack, null)) {
                                        grid[r][c] = true;
                                        stealthGrid[r][c] = true;
                                        let cg2 = document.createElement('div');
                                        cg2.className = 'check-glow';
                                        cells[r][c].appendChild(cg2);
                                    }
                                }
                            }
                        }
                    });
                }

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c]) {
                            cells[r][c].classList.add('visible');
                            cells[r][c].classList.remove('shrouded');
                        }
                    }
                }

                window.localVisionGrid = grid;
                window.localStealthGrid = stealthGrid;

                deadVisions.forEach(dv => {
                    if (dv.player === localPlayerRole) {
                        for (let dr = -dv.radius; dr <= dv.radius; dr++) {
                            for (let dc = -dv.radius; dc <= dv.radius; dc++) {
                                let nr = dv.r + dr, nc = dv.c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (canIlluminate(dv.r, dv.c, nr, nc)) {
                                        cells[nr][nc].querySelector('.death-glow').style.display = 'block';
                                    }
                                }
                            }
                        }
                    }
                });

                renderPieces();
            }

            
            window.addEventListener('beforeunload', function (e) {
                let isPlaying = document.getElementById('viewport').style.display === 'block';
                if (isPlaying && !isGameOver) {
                    e.preventDefault();
                    e.returnValue = ''; 
                }
            });
        </script>
    </body>
    </html>
