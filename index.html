                        }
                    } else {
                        if (movingPiece.carriedBy) movingPiece.carriedBy = null; 
                        movePieceAndPassengers(movingPiece.id, r, c);
                    }
                }

                if (effType === 'Hậu' && !movingPiece.carriedBy) {
                    let ruinIdx = destroyedTowers.findIndex(dt => dt.r === movingPiece.r && dt.c === movingPiece.c && dt.player === movingPiece.player);
                    if (ruinIdx !== -1) {
                        let revivedTower = pieces.find(p => p.id === destroyedTowers[ruinIdx].id);
                        if (revivedTower) { revivedTower.isDead = false; revivedTower.r = movingPiece.r; revivedTower.c = movingPiece.c; movingPiece.carriedBy = revivedTower.id; }
                        destroyedTowers.splice(ruinIdx, 1);
                    }
                }

                selectedPieceId = null; updateVision();

                let p1King = pieces.find(p => p.type === 'Vua' && p.player === 'p1');
                if (p1King && p1King.isDead) {
                    if (unlockedTechs.p1.includes('usurp') && !hasUsurped.p1) {
                        let candidates = pieces.filter(p => p.player === 'p1' && !p.isDead && p.type !== 'Tháp' && p.type !== 'HọcViện');
                        if (candidates.length > 0) {
                            let heir = candidates[Math.floor(Math.random() * candidates.length)];
                            heir.type = 'Vua'; heir.icon = '♔'; heir.vision = 2;
                            p1King.isDead = false; hasUsurped.p1 = true;
                            alert("👑 Vua Đỏ đã chết, nhưng một người khác đã kế vị!");
                        } else isGameOver = true;
                    } else isGameOver = true;
                }

                let p2King = pieces.find(p => p.type === 'Vua' && p.player === 'p2');
                if (p2King && p2King.isDead) {
                    if (unlockedTechs.p2.includes('usurp') && !hasUsurped.p2) {
                        let candidates = pieces.filter(p => p.player === 'p2' && !p.isDead && p.type !== 'Tháp' && p.type !== 'HọcViện');
                        if (candidates.length > 0) {
                            let heir = candidates[Math.floor(Math.random() * candidates.length)];
                            heir.type = 'Vua'; heir.icon = '♚'; heir.vision = 2;
                            p2King.isDead = false; hasUsurped.p2 = true;
                            alert("👑 Vua Đen đã chết, nhưng một người khác đã kế vị!");
                        } else isGameOver = true;
                    } else isGameOver = true;
                }

                if (isGameOver) {
                    saveCurrentState(); updateVision(); syncGameToFirebase(); document.getElementById('btn-replay').style.display = 'block';
                    let won = (p2King && p2King.isDead && localPlayerRole === 'p1') || (p1King && p1King.isDead && localPlayerRole === 'p2');
                    setTimeout(() => alert(won ? '🎉 CHIẾN THẮNG! Bạn đã tiêu diệt Vua địch!' : '💀 BẠN ĐÃ THUA! Vua của bạn đã bị tiêu diệt.'), 300);
                    return;
                }

                let isPromoting = false;
                if (effType === 'Tốt') {
                    if (movingPiece.player === 'p1' && movingPiece.r === 0) isPromoting = true;
                    else if (movingPiece.player === 'p2' && movingPiece.r === ROWS - 1) isPromoting = true;
                }

                if (isPromoting && !isGameOver) {
                    if (movingPiece.player === localPlayerRole) { showPromotionUI(movingPiece); return; } 
                    else if (gameMode === 'pve') { movingPiece.type = 'Hậu'; movingPiece.icon = '♛'; movingPiece.vision = 8; finalizeTurn(movingPiece); return; }
                }

                if (!isGameOver) finalizeTurn(movingPiece);
            }

            function finalizeTurn(movingPiece) {
                let hasExtraMove = false; let effType = movingPiece.type;
                if (isFantasticMode && movingPiece.infected && currentWeather === 'TrăngMáu' && unlockedTechs[movingPiece.player]?.includes('werewolf')) effType = 'NgườiSói';
                
                if (effType === 'Mã' && getEffectiveTerrain(movingPiece.r, movingPiece.c) === 'forest' && !movingPiece.extraMoveUsed) {
                    hasExtraMove = true; movingPiece.extraMoveUsed = true;
                } else if (effType === 'Tàu' && !movingPiece.extraMoveUsed) {
                    let passenger = pieces.find(p => p.carriedBy === movingPiece.id && !p.isDead);
                    if (passenger) {
                        let canDrop = false;
                        for(let dr = -1; dr <= 1; dr++) {
                            for(let dc = -1; dc <= 1; dc++) {
                                let nr = movingPiece.r + dr, nc = movingPiece.c + dc;
                                if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
                                    let t = getEffectiveTerrain(nr, nc);
                                    if(t !== 'ocean' && t !== 'river' && !hasPieceAt(nr, nc)) canDrop = true;
                                }
                            }
                        }
                        if (canDrop) { passenger.canDisembark = true; passenger.extraMoveUsed = true; hasExtraMove = true; movingPiece = passenger; }
                    }
                } else { movingPiece.extraMoveUsed = false; movingPiece.canDisembark = false; }

                if (hasExtraMove) {
                    lockedPieceId = movingPiece.id;
                    if (currentTurn === localPlayerRole) {
                        if (movingPiece.canDisembark) turnInd.innerText = 'CHỌN Ô ĐỂ XUỐNG TÀU (BẤM VÀO QUÂN ĐỂ HỦY)';
                        else turnInd.innerText = 'MÃ ĐƯỢC ĐI THÊM 1 BƯỚC (BẤM VÀO MÃ ĐỂ HỦY)';
                        turnInd.style.backgroundColor = '#f39c12'; selectedPieceId = movingPiece.id; updateVision(); showValidMoves(movingPiece);
                    }
                    saveCurrentState(); syncGameToFirebase(); 
                    if (gameMode === 'pve' && currentTurn !== localPlayerRole) setTimeout(() => playBotAI(movingPiece.id), 800);
                    return;
                } 
                
                let isDogType = ['Chó', 'ChóHoàngGia'].includes(effType);
                let hasHowl = unlockedTechs[movingPiece.player]?.includes('royalDog2');

                if (isDogType && hasHowl) {
                    movingPiece.packMoved = true;
                    let otherDogs = pieces.filter(p => p.player === movingPiece.player && !p.isDead && ['Chó', 'ChóHoàngGia'].includes(p.type) && !p.packMoved);
                    
                    if (otherDogs.length > 0) {
                        window.activePackPlayer = movingPiece.player;
                        selectedPieceId = null; updateVision(); saveCurrentState(); syncGameToFirebase(); updateTurnUI();
                        if (gameMode === 'pve' && currentTurn !== localPlayerRole) setTimeout(() => playBotAI(), 800);
                        return; 
                    }
                }
                
                window.activePackPlayer = null; pieces.forEach(p => p.packMoved = false);
                lockedPieceId = null; pieces.filter(p => p.player === currentTurn).forEach(p => p.extraMoveUsed = false);
                
                if (currentTurn === 'p2') {
                    if (isFantasticMode) { weatherTurnsLeft--; if (weatherTurnsLeft <= 0) cycleWeather(); else updateWeatherUI(); playNeutralAI(); }
                    currentTurn = 'p1';
                } else {
                    currentTurn = 'p2';
                }
                
                saveCurrentState(); updateTurnUI(); syncGameToFirebase(); updateVision();
                if (gameMode === 'pve' && currentTurn !== localPlayerRole) setTimeout(() => playBotAI(), 800); 
            }

            function playBotAI(forcedPieceId = null) {
                if (isGameOver || gameMode !== 'pve') return;

                let didResearch = false;
                let botMages = pieces.filter(p => p.player === currentTurn && p.type === 'PhápSư' && p.carriedBy && !p.isDead);
                for (let mage of botMages) {
                    let carrier = pieces.find(p => p.id === mage.carriedBy);
                    if (carrier && carrier.type === 'HọcViện' && !mage.hasMoved) {
                        let availableTechs = Object.keys(TECH_TREE).filter(k => 
                            !unlockedTechs[currentTurn].includes(k) && (!TECH_TREE[k].req || unlockedTechs[currentTurn].includes(TECH_TREE[k].req))
                        );
                        if (availableTechs.length > 0) {
                            let techToResearch = availableTechs[Math.floor(Math.random() * availableTechs.length)];
                            let amt = unlockedTechs[currentTurn].includes('genius') ? 2 : 1;
                            if (!techProgress[currentTurn][techToResearch]) techProgress[currentTurn][techToResearch] = 0;
                            techProgress[currentTurn][techToResearch] += amt;
                            
                            let boom = document.createElement('div'); boom.className = 'boom'; boom.style.backgroundColor = '#9b59b6'; cells[mage.r][mage.c].appendChild(boom); setTimeout(() => boom.remove(), 500);

                            if (techProgress[currentTurn][techToResearch] >= TECH_TREE[techToResearch].cost) unlockedTechs[currentTurn].push(techToResearch);
                            mage.hasMoved = true; didResearch = true; setTimeout(() => finalizeTurn(mage), 500); 
                            break; 
                        }
                    }
                }
                if (didResearch) return; 
                
                let bots = pieces.filter(p => p.player === currentTurn && !p.isDead && !p.carriedBy && p.type !== 'Tháp');
                bots = bots.concat(pieces.filter(p => p.player === currentTurn && !p.isDead && p.carriedBy && p.type === 'PhápSư'));
                
                if (window.activePackPlayer === currentTurn) {
                    bots = bots.filter(p => ['Chó', 'ChóHoàngGia'].includes(p.type) && !p.packMoved);
                }
                if (forcedPieceId) bots = bots.filter(p => p.id === forcedPieceId);
                
                let playerPs = pieces.filter(p => p.player === localPlayerRole && !p.isDead);
                let botVisionObj = calculateVisionMatrix(currentTurn); let botVision = botVisionObj.grid; let botStealth = botVisionObj.stealthGrid; let moves = [];

                let threatMap = Array(ROWS).fill().map(() => Array(COLS).fill(false));
                let enemyPieces = pieces.filter(p => p.player !== currentTurn && !p.isDead && !p.carriedBy && !(currentWeather === 'VuaSầuRiêng' && p.type === 'Xe'));
                enemyPieces.forEach(ep => {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (Math.max(Math.abs(ep.r - r), Math.abs(ep.c - c)) > 10) continue;
                            if (isValidAction(ep, r, c, true, null)) threatMap[r][c] = true;
                        }
                    }
                });

                let defenseMap = Array(ROWS).fill().map(() => Array(COLS).fill(false));
                bots.forEach(bp => {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (Math.max(Math.abs(bp.r - r), Math.abs(bp.c - c)) > 10) continue;
                            if (isValidAction(bp, r, c, true, null)) defenseMap[r][c] = true;
                        }
                    }
                });

                let enemyKing = pieces.find(p => p.player === localPlayerRole && p.type === 'Vua' && !p.isDead);

                bots.forEach(piece => {
                    let effType = piece.type;
                    if (isFantasticMode && piece.infected && currentWeather === 'TrăngMáu' && unlockedTechs[piece.player]?.includes('werewolf')) effType = 'NgườiSói';

                    let limit = (effType === 'BắnĐá' || effType === 'Xe') ? 10 : (effType === 'Tàu' ? 8 : 7);
                    if (effType === 'PhápSư') limit = 8;
                    
                    let inForest = getEffectiveTerrain(piece.r, piece.c) === 'forest'; let canWrap = ['Tốt', 'Mã', 'Medusa'].includes(effType) && inForest;
                    let carrierT = piece.carriedBy ? pieces.find(p => p.id === piece.carriedBy) : null;
                    let isBishopInTower = effType === 'Tượng' && carrierT && ['Tháp', 'HọcViện'].includes(carrierT.type);

                    let minC = Math.max(0, piece.c - limit); let maxC = Math.min(COLS - 1, piece.c + limit);
                    let minR = Math.max(0, piece.r - limit); let maxR = Math.min(ROWS - 1, piece.r + limit);
                    if (canWrap || isBishopInTower) { minC = 0; maxC = COLS - 1; } if (isBishopInTower) { minR = 0; maxR = ROWS - 1; }
                    
                    for (let r = minR; r <= maxR; r++) {
                        for (let c = minC; c <= maxC; c++) {
                            if (r === piece.r && c === piece.c) continue;
                            let target = pieces.find(p => p.r === r && p.c === c && !p.isDead && !(currentWeather === 'VuaSầuRiêng' && p.type === 'Xe')); 
                            let isA = target && target.player !== currentTurn;

                            if (isA && target.player === localPlayerRole && ['Tốt', 'Mã', 'Medusa'].includes(target.type) && getEffectiveTerrain(target.r, target.c) === 'forest') {
                                if (!botStealth[target.r][target.c]) continue; 
                            }
                            if (target && target.player === currentTurn) {
                                if (isValidAction(piece, r, c, false, botVision)) {
                                    let score = 35; if (isBishopInTower && target.type !== 'Tháp' && target.type !== 'HọcViện') score += 25; 
                                    moves.push({ piece, r, c, targetPiece: target, score: score, isAttack: false });
                                }
                                continue;
                            }

                            if (effType === 'Xe' && unlockedTechs[currentTurn]?.includes('tank')) {
                                 piece.tankMode = true;
                                 if (isValidAction(piece, r, c, true, botVision)) {
                                     let tVal = target ? (PIECE_VALUES[target.type] || 10) : 0;
                                     if (target && target.type === 'Vua') tVal = 100000;
                                     moves.push({ piece, r, c, targetPiece: target, score: 50 + tVal * 10, isAttack: true, isTankShot: true });
                                 }
                                 piece.tankMode = false;
                            }

                            if (isValidAction(piece, r, c, isA, botVision)) {
                                let score = 0; let pieceValue = PIECE_VALUES[piece.type] || 10; if (piece.type === 'Vua') pieceValue = 5000;
                                let currentlyInDanger = threatMap[piece.r][piece.c]; let willBeInDanger = threatMap[r][c]; let isDefended = defenseMap[r][c];
                                
                                if (currentlyInDanger && !willBeInDanger) score += pieceValue * 15; 
                                else if (!currentlyInDanger && willBeInDanger) {
                                    if (isDefended) score -= pieceValue * 1.5; else score -= pieceValue * 20; 
                                }
                                if (isA && target) {
                                    let targetValue = PIECE_VALUES[target.type] || 10;
                                    if (target.type === 'Vua') score += 100000; 
                                    else {
                                        if (willBeInDanger && !isDefended) score += (targetValue - pieceValue) * 10; 
                                        else score += targetValue * 15; 
                                    }
                                } else {
                                    let advanceBonus = (currentTurn === 'p2' ? r : (ROWS - r)); score += advanceBonus * 0.5; 
                                    if (!piece.hasMoved) score += 35; 
                                    let isMovingBackward = (currentTurn === 'p1' && r > piece.r) || (currentTurn === 'p2' && r < piece.r);
                                    if (isMovingBackward && !currentlyInDanger) score -= 40; 
                                    if (effType === 'Tàu' && !pieces.some(p => p.carriedBy === piece.id)) score -= 25; 
                                    if (enemyKing && pieceValue >= 30) {
                                        let oldDistToKing = Math.abs(piece.r - enemyKing.r) + Math.abs(piece.c - enemyKing.c); let newDistToKing = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
                                        if (newDistToKing < oldDistToKing) score += 25; 
                                    }
                                }
                                if (getEffectiveTerrain(r, c) === 'hill' && (effType === 'BắnĐá' || effType === 'ĐạiBàng')) score += 50;
                                if (getEffectiveTerrain(r, c) === 'forest' && (effType === 'Tốt' || effType === 'Mã')) score += 30;
                                if (effType === 'Hậu' && !isA) {
                                    let isRuin = destroyedTowers.some(dt => dt.r === r && dt.c === c && dt.player === piece.player);
                                    if (isRuin) score += 300; 
                                }
                                score += Math.floor(Math.random() * 8); 
                                moves.push({ piece, r, c, targetPiece: target, score, isAttack: isA });
                            }
                        }
                    }
                });

                bots.forEach(piece => {
                    if (playerPs.some(pp => Math.max(Math.abs(pp.r - piece.r), Math.abs(pp.c - piece.c)) <= 10 && isValidAction(pp, piece.r, piece.c, true))) {
                        if (PIECE_VALUES[piece.type] >= 100) moves.filter(m => m.piece.id === piece.id).forEach(m => m.score += 500);
                    }
                });

                if (moves.length > 0) {
                    moves.sort((a, b) => b.score - a.score); let best = moves[0];
                    if (best.isTankShot) best.piece.tankMode = true;
                    executeMove(best.piece, best.r, best.c, best.isAttack, best.targetPiece);
                    if (best.isTankShot) best.piece.tankMode = false;
                } else {
                    if (forcedPieceId) {
                        let mp = pieces.find(p => p.id === forcedPieceId); if(mp) { mp.extraMoveUsed = false; mp.canDisembark = false; }
                        lockedPieceId = null; window.activePackPlayer = null; pieces.forEach(p => p.packMoved = false);
                        if (currentTurn === 'p2') {
                            if (isFantasticMode) { weatherTurnsLeft--; if (weatherTurnsLeft <= 0) cycleWeather(); else updateWeatherUI(); playNeutralAI(); }
                            currentTurn = 'p1';
                        } else currentTurn = 'p2';
                        updateTurnUI(); updateVision(); return;
                    }
                    window.activePackPlayer = null; pieces.forEach(p => p.packMoved = false);
                    if (currentTurn === 'p2') {
                        if (isFantasticMode) { weatherTurnsLeft--; if (weatherTurnsLeft <= 0) cycleWeather(); else updateWeatherUI(); playNeutralAI(); }
                        currentTurn = 'p1';
                    } else {
                        currentTurn = 'p2';
                    }
                    updateTurnUI(); updateVision();
                }
            }

            function updateVision() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        cells[r][c].classList.remove('visible'); cells[r][c].classList.add('shrouded');
                    }
                }
                let myVisionObj = calculateVisionMatrix(localPlayerRole);
                let grid = myVisionObj.grid; let stealthGrid = myVisionObj.stealthGrid;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c]) { cells[r][c].classList.add('visible'); cells[r][c].classList.remove('shrouded'); }
                    }
                }
                window.localStealthGrid = stealthGrid; renderPieces(); 
            }

            window.addEventListener('beforeunload', function (e) {
                let isPlaying = document.getElementById('viewport').style.display === 'block';
                if (isPlaying && !isGameOver) { e.preventDefault(); e.returnValue = ''; }
            });
        </script>
    </body>
    </html>
