                        });
                    } else {
                        let v = p.vision || 0;
                        if (['Chó', 'Sói', 'Ngựa', 'ChóHoàngGia', 'SóiHoàngGia', 'SóiThần'].includes(effectiveType)) v = 2;
                        if (['Voi'].includes(effectiveType)) v = 5;
                        if (['VoiChiến', 'Chim'].includes(effectiveType)) v = 5;
                        if (effectiveType === 'RắnChúa') v = 1;
                        if (effectiveType === 'Medusa') v = 8;
                        if (effectiveType === 'CáMập') v = 10;

                        if (effectiveType === 'Tốt' && isPieceInForest) v = 4;

                        if (isCarriedByThap) {
                            if (effectiveType === 'ĐạiBàng') v = 9;
                            if (effectiveType === 'BắnĐá') v = 6;
                        }
                        
                        if (isFantasticMode && currentWeather === 'SươngMù') v = 0;

                        let wrapAnimals = ['Sói', 'Voi', 'Chim', 'RắnChúa', 'Ngựa', 'Chó', 'ChóHoàngGia', 'SóiHoàngGia', 'SóiThần', 'VoiChiến', 'Medusa', 'NgườiSói'];
                        let isWrapPiece = ['Tốt', 'Mã', ...wrapAnimals].includes(effectiveType);
                        let isOceanPiece = effectiveType === 'Tàu' || effectiveType === 'BắnĐá' || effectiveType === 'ĐạiBàng' || getEffectiveTerrain(p.r, p.c) === 'ocean';

                        for (let dr = -v; dr <= v; dr++) {
                            for (let dc = -v; dc <= v; dc++) {
                                let nr = p.r + dr;
                                let origNc = p.c + dc;
                                let nc = origNc;

                                if (isWrapPiece && isPieceInForest) {
                                    if (origNc < 3 && dc < 0) nc = 24 + (origNc - 2);
                                    else if (origNc > 24 && dc > 0) nc = 3 + (origNc - 25);
                                    
                                    if (nc !== origNc) {
                                        if (nr < 0 || nr >= ROWS || getEffectiveTerrain(nr, nc) !== 'forest') {
                                            nc = origNc; 
                                        }
                                    }
                                } else if (isOceanPiece) {
                                    if (origNc < 0) nc = origNc + 28;
                                    else if (origNc >= COLS) nc = origNc - 28;
                                }

                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (Math.max(Math.abs(dr), Math.abs(dc)) <= v) {
                                        if (canIlluminate(p.r, p.c, nr, nc)) {
                                            grid[nr][nc] = true;
                                            if (nc === origNc || isOceanPiece) {
                                                stealthGrid[nr][nc] = true;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                });

                if (!(isFantasticMode && (currentWeather === 'SươngMù' || currentWeather === 'TrăngMáu'))) {
                    let livingEagles = pieces.filter(p => p.type === 'ĐạiBàng' && !p.isDead && p.player === player);
                    if (livingEagles.length === 0) {
                        for (let r = 0; r < ROWS; r++) {
                            for (let c = 0; c < COLS; c++) {
                                if (getEffectiveTerrain(r, c) !== 'forest') {
                                    grid[r][c] = true;
                                }
                            }
                        }
                    }
                }

                return { grid, stealthGrid };
            }

            function isValidAction(piece, targetR, targetC, isAttack, botVisionGrid = null) {
                if (isFantasticMode && currentWeather === 'TrăngMáu' && isAttack && piece.player !== 'neutral') return false; 

                let effectiveType = piece.type;
                if (isFantasticMode && piece.infected && currentWeather === 'TrăngMáu') {
                    effectiveType = 'NgườiSói';
                }
                if (isFantasticMode && piece.type === 'SóiHoàngGia' && currentWeather === 'TrăngMáu') {
                    effectiveType = 'SóiThần';
                }

                if (effectiveType === 'Sói' && isAttack && isFantasticMode && currentWeather === 'TrăngMáu') {
                    let targetPiece = pieces.find(p => p.r === targetR && p.c === targetC && !p.isDead && p.carriedBy == null);
                    let targetPlayer = targetPiece ? targetPiece.player : null;
                    if (targetPlayer && targetPlayer !== 'neutral') {
                        let hasAura = pieces.some(dog => dog.type === 'SóiHoàngGia' && dog.player === targetPlayer && !dog.isDead && Math.max(Math.abs(dog.r - targetPiece.r), Math.abs(dog.c - targetPiece.c)) <= 2);
                        if (hasAura) return false;
                    }
                }
                
                if (isFantasticMode && piece.player !== 'neutral') {
                    let isPetrified = pieces.some(enemy => enemy.player !== piece.player && enemy.player !== 'neutral' && !enemy.isDead && enemy.type === 'Medusa' && unlockedTechs[enemy.player]?.includes('medusaUp') && Math.max(Math.abs(enemy.r - piece.r), Math.abs(enemy.c - piece.c)) <= 1);
                    if (isPetrified) return false; 
                }

                let dr = targetR - piece.r;
                let dc = targetC - piece.c;
                let absR = Math.abs(dr);
                let absC = Math.abs(dc);
                let terrain = getEffectiveTerrain(targetR, targetC);
                let forward = piece.player === 'p1' ? -1 : 1;
                
                let targetFriendlyObj = pieces.find(p => p.r === targetR && p.c === targetC && p.player === piece.player && !p.isDead && !p.carriedBy);
                let actualTargetEnemy = pieces.find(p => p.r === targetR && p.c === targetC && !p.isDead && p.carriedBy == null && p.player !== piece.player);
                
                if (!isAttack && actualTargetEnemy) return false;

                if (piece.cannonMode && effectiveType === 'BắnĐá' && unlockedTechs[piece.player]?.includes('cannon')) {
                    if (targetFriendlyObj) return false;
                } else if (!isAttack && targetFriendlyObj) {
                    // Logic boarding
                }

                if (piece.canDisembark) {
                    return Math.max(absR, absC) <= 1 && terrain !== 'ocean' && terrain !== 'river' && !targetFriendlyObj && !actualTargetEnemy;
                }

                let isWrapMove = false;
                let isOceanWrapMove = false;
                let effectiveAbsC = absC;
                let effectiveDc = dc;

                let inForest = getEffectiveTerrain(piece.r, piece.c) === 'forest';
                let targetInForest = terrain === 'forest';

                let wrapAnimals = ['Sói', 'Voi', 'Chim', 'RắnChúa', 'Ngựa', 'Chó', 'ChóHoàngGia', 'SóiHoàngGia', 'SóiThần', 'VoiChiến', 'Medusa', 'NgườiSói'];
                let isWrapPiece = ['Tốt', 'Mã', ...wrapAnimals].includes(effectiveType);

                if (isWrapPiece && inForest && targetInForest) {
                    let wrapDc1 = dc + 22; let wrapDc2 = dc - 22;
                    if (Math.abs(wrapDc1) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc1); effectiveDc = wrapDc1; isWrapMove = true;
                    } else if (Math.abs(wrapDc2) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc2); effectiveDc = wrapDc2; isWrapMove = true;
                    }
                } 
                else if (['Tàu', 'BắnĐá', 'ĐạiBàng'].includes(effectiveType)) {
                    let wrapDc1 = dc + 28; let wrapDc2 = dc - 28;
                    if (Math.abs(wrapDc1) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc1); effectiveDc = wrapDc1; isWrapMove = true; isOceanWrapMove = true;
                    } else if (Math.abs(wrapDc2) < effectiveAbsC) {
                        effectiveAbsC = Math.abs(wrapDc2); effectiveDc = wrapDc2; isWrapMove = true; isOceanWrapMove = true;
                    }
                }

                let isWater = (terrain === 'ocean' || terrain === 'river');

                let isShoreAttack = false;
                if (isAttack && actualTargetEnemy && actualTargetEnemy.type === 'Tàu' && ['ocean', 'river'].includes(getEffectiveTerrain(actualTargetEnemy.r, actualTargetEnemy.c))) {
                    if (!['Tàu', 'ĐạiBàng', 'BắnĐá', 'Chim', 'NgườiSói'].includes(effectiveType)) {
                        if (Math.max(absR, effectiveAbsC) === 1) {
                            isShoreAttack = true; 
                        }
                    }
                }

                let isBoardingFromDistance = false;
                let carrierT = piece.carriedBy ? pieces.find(p => p.id === piece.carriedBy) : null;
                let isBishopInTower = effectiveType === 'Tượng' && carrierT && ['Tháp', 'HọcViện'].includes(carrierT.type);
                let isBishopInPort = effectiveType === 'Tượng' && getEffectiveTerrain(piece.r, piece.c) === 'port';

                if (!isAttack && targetFriendlyObj) {
                    let isWaterTarget = getEffectiveTerrain(targetR, targetC) === 'ocean' || getEffectiveTerrain(targetR, targetC) === 'river';
                    
                    if ((isBishopInTower || isBishopInPort) && targetFriendlyObj.type !== 'Tháp' && targetFriendlyObj.type !== 'HọcViện' && !isWaterTarget) return true; 
                    
                    if (targetFriendlyObj && targetFriendlyObj.type === 'HọcViện') {
                        if (effectiveType !== 'PhápSư') return false; 
                        let isFull = pieces.some(p => p.carriedBy === targetFriendlyObj.id && !p.isDead);
                        if (isFull) return false;
                        if (Math.max(absR, effectiveAbsC) <= 1) return true; 
                        isBoardingFromDistance = true; 
                    } else 
                    if (['Tàu', 'Xe', 'Mã', 'Tháp', 'VoiChiến'].includes(targetFriendlyObj.type)) {
                        if (effectiveType === 'Tháp') return false; 
                        let isFull = pieces.some(p => p.carriedBy === targetFriendlyObj.id && !p.isDead);
                        if (isFull) return false;
                        if (Math.max(absR, effectiveAbsC) <= 1) return true; 
                        isBoardingFromDistance = true; 
                    } else return false; 
                }
                
                if (isAttack && actualTargetEnemy && actualTargetEnemy.type === 'HọcViện' && effectiveType === 'PhápSư' && unlockedTechs[piece.player]?.includes('superIntellect')) {
                    let isFull = pieces.some(p => p.carriedBy === actualTargetEnemy.id && !p.isDead);
                    if (!isFull && Math.max(absR, effectiveAbsC) <= 1) return true; 
                    if (!isFull) isBoardingFromDistance = true;
                }

                if (effectiveType === 'Tháp' || effectiveType === 'HọcViện') return false; 
                
                if (!isBoardingFromDistance) {
                    if (effectiveType === 'Tàu' && !isWater && terrain !== 'port' && !isAttack) return false;
                    if (effectiveType !== 'Tàu' && effectiveType !== 'ĐạiBàng' && effectiveType !== 'Chim' && isWater) {
                        if (!(effectiveType === 'BắnĐá' && (isAttack || piece.cannonMode)) && !isShoreAttack) {
                            return false;
                        }
                    }
                }

                if ((effectiveType === 'ĐạiBàng' || effectiveType === 'BắnĐá') && terrain === 'forest' && !(isBoardingFromDistance && targetFriendlyObj && ['Tháp', 'HọcViện'].includes(targetFriendlyObj.type))) {
                    return false;
                }

                let isLineMove = (absR === 0 || effectiveAbsC === 0 || absR === effectiveAbsC);
                
                if (effectiveType === 'Medusa' && inForest && targetInForest && !isAttack) {
                    return true; 
                }

                let isWaterBlocked = false;
                let canMoveOnWater = ['ĐạiBàng', 'Chim', 'Tàu', 'Medusa', 'NgườiSói', 'SóiThần', 'CáMập'].includes(effectiveType) || (effectiveType === 'BắnĐá' && (isAttack || piece.cannonMode));
                if (effectiveType === 'PhápSư') canMoveOnWater = true; 
                if (effectiveType === 'Xe' && unlockedTechs[piece.player]?.includes('atv')) canMoveOnWater = true;

                if (!canMoveOnWater) {
                    if (isWater && !isBoardingFromDistance && !isShoreAttack) {
                        isWaterBlocked = true; 
                    }
                    
                    if (!isWaterBlocked && isLineMove) {
                        let sdr = Math.sign(dr), sdc = Math.sign(effectiveDc);
                        let cr = piece.r + sdr, cc = piece.c;
                        function getNextCol(c, step) {
                             if(isOceanWrapMove) return (c + step + 28) % 28;
                             if(isWrapMove) {
                                 let nc = c + step;
                                 if (nc < 3 && step < 0) return 24 + (nc - 2); 
                                 if (nc > 24 && step > 0) return 3 + (nc - 25); 
                                 return nc;
                             }
                             return c + step;
                        }
                        cc = getNextCol(cc, sdc);
                        let steps = Math.max(absR, effectiveAbsC);
                        for(let i = 1; i < steps; i++) {
                            let pathTerrain = getEffectiveTerrain(cr, cc);
                            let blocksWater = (pathTerrain === 'river' || pathTerrain === 'ocean');

                            if (blocksWater) { isWaterBlocked = true; break; }
                            cr += sdr; cc = getNextCol(cc, sdc);
                        }
                    }
                }
                if (isWaterBlocked) return false; 

                let isMageFlying = effectiveType === 'PhápSư' && (unlockedTechs[piece.player]?.includes('fly1') || unlockedTechs[piece.player]?.includes('fly2') || unlockedTechs[piece.player]?.includes('fly3'));
                if (isFantasticMode && currentWeather === 'MùaGió') isMageFlying = false;

                let pathClearCheck = true;
                if (!['ĐạiBàng', 'Chim', 'BắnĐá', 'Mã', 'Tàu', 'Medusa', 'NgườiSói', 'CáMập'].includes(effectiveType)) {
                    let startHill = getEffectiveTerrain(piece.r, piece.c) === 'hill';
                    let endHill = terrain === 'hill';
                    if (startHill !== endHill && Math.max(absR, effectiveAbsC) > 1) return false;
                    
                    if (isLineMove && Math.max(absR, effectiveAbsC) > 1 && !isWrapMove && !isBoardingFromDistance) {
                        let sdr = Math.sign(dr), sdc = Math.sign(effectiveDc);
                        let cr = piece.r + sdr, cc = piece.c + sdc;
                        let steps = 0;
                        while ((cr !== targetR || cc !== targetC) && steps < 30) {
                            if (getEffectiveTerrain(cr, cc) === 'hill' !== startHill) return false;
                            cr += sdr; cc += sdc; steps++;
                        }
                    }
                }

                if (isBoardingFromDistance) pathClearCheck = isPathClear(piece, piece.r, piece.c, targetR, targetC);
                else if (isWrapMove) pathClearCheck = isWrapPathClear(piece.r, piece.c, targetR, targetC, effectiveDc, isOceanWrapMove);
                else if (isLineMove) pathClearCheck = isPathClear(piece, piece.r, piece.c, targetR, targetC);

                if (isMageFlying && !isAttack) pathClearCheck = true; 
                
                if (isFantasticMode && currentWeather === 'MùaGió' && (effectiveType === 'ĐạiBàng' || effectiveType === 'Chim')) {
                    if (!pathClearCheck) return false; 
                }

                switch (effectiveType) {
                    case 'Vua': return absR <= 1 && effectiveAbsC <= 1;
                    
                    case 'HọcViện': return false;
                    case 'CáMập': 
                        if (!isLineMove) return false;
                        if (terrain !== 'ocean' && terrain !== 'river' && terrain !== 'frozen') return false; 
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= 6 && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 10 && pathClearCheck;

                    case 'PhápSư':
                        let maxFly = 2;
                        let maxAtk = 4; 
                        
                        let isFly3 = unlockedTechs[piece.player]?.includes('fly3');

                        if (isFly3) maxFly = 7;
                        else if (unlockedTechs[piece.player]?.includes('fly2')) maxFly = 7;
                        else if (unlockedTechs[piece.player]?.includes('fly1')) maxFly = 5;
                        
                        if (unlockedTechs[piece.player]?.includes('attack2')) maxAtk = 8;
                        else if (unlockedTechs[piece.player]?.includes('attack1')) maxAtk = 5;
                        
                        let isStraightLine = (absR === 0 || effectiveAbsC === 0);

                        if (isFantasticMode && currentWeather === 'MùaGió') {
                            maxFly = Math.max(1, maxFly - 1);
                            if (!isStraightLine) return false;
                            if (!isAttack && !pathClearCheck) return false;
                        } else {
                            if (!isStraightLine && !isFly3) return false;
                        }

                        if (isAttack) {
                            return Math.max(absR, effectiveAbsC) <= maxAtk && pathClearCheck; 
                        } else {
                            return Math.max(absR, effectiveAbsC) <= maxFly && pathClearCheck; 
                        }

                    case 'Tốt': 
                        let isPastRiver = piece.player === 'p1' ? piece.r <= 14 : piece.r >= 15;
                        
                        if (inForest) {
                            if (isAttack) {
                                let canDiag = absR === effectiveAbsC && absR <= 4;
                                let canHorizVert = (absR === 0 && effectiveAbsC <= 4) || (effectiveAbsC === 0 && absR <= 4);
                                return (canDiag || canHorizVert) && pathClearCheck;
                            } else {
                                return ((absR === 0 && effectiveAbsC <= 4) || (effectiveAbsC === 0 && absR <= 4)) && pathClearCheck;
                            }
                        } else {
                            if (isAttack) {
                                if (isPastRiver) {
                                    let canDiag = absR === effectiveAbsC && absR <= 2 && (dr * forward > 0);
                                    let canHoriz = absR === 0 && effectiveAbsC <= 2;
                                    return (canDiag || canHoriz) && pathClearCheck;
                                } else {
                                    return absR === effectiveAbsC && absR <= 2 && (dr * forward > 0) && pathClearCheck;
                                }
                            } else {
                                let maxDist = piece.hasMoved ? 3 : 5;
                                if (unlockedTechs[piece.player]?.includes('bravePawn')) maxDist = 5;

                                if (isPastRiver) {
                                    let horizDist = 2;
                                    return ((effectiveDc === 0 && (dr * forward > 0) && absR <= maxDist) || (dr === 0 && effectiveAbsC <= horizDist)) && pathClearCheck;
                                } else {
                                    return effectiveDc === 0 && (dr * forward > 0) && absR <= maxDist && pathClearCheck;
                                }
                            }
                        }
                    
                    case 'Hậu': 
                        let hauLimit = getEffectiveTerrain(piece.r, piece.c) === 'forest' ? 3 : 8;
                        return isLineMove && Math.max(absR, effectiveAbsC) <= hauLimit && pathClearCheck;
                    case 'Xe': 
                        let xeLimit = getEffectiveTerrain(piece.r, piece.c) === 'forest' ? 2 : 8;
                        return (absR === 0 || effectiveAbsC === 0) && Math.max(absR, effectiveAbsC) <= xeLimit && pathClearCheck;
                    case 'Tượng': 
                        let tuongLimit = getEffectiveTerrain(piece.r, piece.c) === 'forest' ? 1 : 8;
                        return (absR === effectiveAbsC) && absR <= tuongLimit && pathClearCheck;
                    case 'Mã': 
                        return (absR === 2 && effectiveAbsC === 1) || (absR === 1 && effectiveAbsC === 2);
                    
                    case 'ĐạiBàng':
                    case 'Chim':
                        let limitMove = effectiveType === 'Chim' ? 5 : 7;
                        if (isFantasticMode && currentWeather === 'MùaGió') limitMove = 1;
                        if (isAttack) {
                            let atkRange = (effectiveType === 'ĐạiBàng' && unlockedTechs[piece.player]?.includes('eagleFly')) ? 2 : 1;
                            return Math.max(absR, effectiveAbsC) <= atkRange && pathClearCheck; 
                        } else {
                            return Math.max(absR, effectiveAbsC) <= limitMove; 
                        }
                    
                    case 'BắnĐá':
                        let isOnPort = getEffectiveTerrain(piece.r, piece.c) === 'port';
                        let canShootDiagonal = isOnPort ? (absR === effectiveAbsC) : false;
                        
                        let isCannon = unlockedTechs[piece.player]?.includes('cannon');

                        if (!isLineMove && !canShootDiagonal) return false; 

                        if (!isOnPort) {
                            if (piece.player === 'p1' && dr > 0) return false; 
                            if (piece.player === 'p2' && dr < 0) return false; 
                        }

                        if (isAttack || piece.cannonMode) {
                            let maxRange = isOnPort ? 12 : 10;
                            let canSee = piece.player === localPlayerRole ? cells[targetR][targetC].classList.contains('visible') : (botVisionGrid ? botVisionGrid[targetR][targetC] : false);
                            
                            if (isCannon) canSee = true;
                            if (!canSee || Math.max(absR, effectiveAbsC) > maxRange) return false;
                            if (isCannon) return true; 
                            
                            let obsCount = countObstacles(piece.r, piece.c, targetR, targetC, isWrapMove ? effectiveDc : null, isOceanWrapMove);
                            let isOnHill = getEffectiveTerrain(piece.r, piece.c) === 'hill';
                            
                            if (obsCount === 0) return true; 
                            if (obsCount === 1 && isOnHill) return true; 
                            return false; 
                        } else {
                            return Math.max(absR, effectiveAbsC) <= 3 && pathClearCheck;
                        }
                    
                    case 'Tàu':
                        if (!isLineMove) return false; 
                        let distance = Math.max(absR, effectiveAbsC);
                        if (isAttack) {
                            return distance <= 4 && pathClearCheck;
                        } else {
                            if (effectiveAbsC === 0) {
                                return distance <= 8 && pathClearCheck;
                            } else {
                                return distance <= 2 && pathClearCheck;
                            }
                        }

                    case 'Chó':
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;

                    case 'ChóHoàngGia':
                        let dRange = unlockedTechs[piece.player]?.includes('royalDog') ? 2 : 1;
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= dRange && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;
                        
                    case 'SóiHoàngGia':
                    case 'SóiThần':
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;

                    case 'VoiChiến':
                        let isWarEleUpgraded = unlockedTechs[piece.player]?.includes('warElephant');
                        if (isWarEleUpgraded) {
                            let isStraight = (absR === 0 || effectiveAbsC === 0);
                            if (!isStraight) return false;
                            let vDist = Math.max(absR, effectiveAbsC);
                            return vDist <= 8 && pathClearCheck;
                        } else {
                            if (absR !== 0 && effectiveAbsC !== 0) return false;
                            return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;
                        }
                    case 'Voi':
                        if (absR !== 0 && effectiveAbsC !== 0) return false;
                        return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;

                    case 'Sói':
                    case 'Ngựa':
                        return Math.max(absR, effectiveAbsC) <= 2 && pathClearCheck;

                    case 'RắnChúa':
                        return Math.max(absR, effectiveAbsC) <= 1 && pathClearCheck;

                    case 'Medusa':
                        if (!isLineMove) return false;
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= 1 && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 8 && pathClearCheck;
                    
                    case 'NgườiSói':
                        if (isAttack) return Math.max(absR, effectiveAbsC) <= 5 && pathClearCheck;
                        return Math.max(absR, effectiveAbsC) <= 7 && pathClearCheck;
                }
                
                return false;
            }

            function showExplosion(r, c) {
                let boom = document.createElement('div');
                boom.className = 'boom';
                cells[r][c].appendChild(boom);
                setTimeout(() => boom.remove(), 500);
            }

            function showPromotionUI(piece) {
                let overlay = document.createElement('div');
                overlay.id = 'promo-overlay';
                overlay.innerHTML = `
                    <div id="promo-box">
                        <h3>🎖️ PHONG CẤP TỐT 🎖️</h3>
                        <p>Hãy chọn quyền lực mới:</p>
                        <div class="promo-btn-container">
                            <button class="promo-btn" data-type="Hậu" data-icon="♕" data-vision="8"><span class="promo-icon">♕</span> Hậu</button>
                            <button class="promo-btn" data-type="Xe" data-icon="♖" data-vision="8"><span class="promo-icon">♖</span> Xe</button>
                            <button class="promo-btn" data-type="Mã" data-icon="♘" data-vision="3"><span class="promo-icon">♘</span> Mã</button>
                            <button class="promo-btn" data-type="Tượng" data-icon="♗" data-vision="8"><span class="promo-icon">♗</span> Tượng</button>
                            <button class="promo-btn" data-type="ĐạiBàng" data-icon="🦅" data-vision="3"><span class="promo-icon">🦅</span> Đại Bàng</button>
                            <button class="promo-btn" data-type="BắnĐá" data-icon="🎯" data-vision="2"><span class="promo-icon">🎯</span> Bắn Đá</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                document.querySelectorAll('.promo-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        let targetBtn = e.target.closest('.promo-btn');
                        piece.type = targetBtn.dataset.type;
                        piece.icon = targetBtn.dataset.icon;
                        piece.vision = parseInt(targetBtn.dataset.vision);
                        
                        document.getElementById('promo-overlay').remove();
                        renderPieces();
                        finalizeTurn(piece);
                    });
                });
            }

            function killPieceAndPassengers(pieceId) {
                let p = pieces.find(x => x.id === pieceId);
                if (p && !p.isDead) {
                    p.isDead = true;
                    let passengers = pieces.filter(x => x.carriedBy === pieceId && !x.isDead);
                    passengers.forEach(pass => killPieceAndPassengers(pass.id));
                }
            }
            
            function movePieceAndPassengers(pieceId, newR, newC) {
                let p = pieces.find(x => x.id === pieceId);
                if (p && !p.isDead) {
                    p.r = newR;
                    p.c = newC;
                    let passengers = pieces.filter(x => x.carriedBy === pieceId && !x.isDead);
                    passengers.forEach(pass => movePieceAndPassengers(pass.id, newR, newC));
                }
            }

            function showPieceSelector(piecesInCell, r, c) {
                let menu = document.getElementById('piece-selector-menu');
                if (!menu) {
                    menu = document.createElement('div');
                    menu.id = 'piece-selector-menu';
                    document.body.appendChild(menu);
                }
                menu.innerHTML = ''; 
                
                let header = document.createElement('div');
                header.innerText = 'CHỌN QUÂN:';
                header.style.cssText = 'color: #f1c40f; font-size: 12px; text-align: center; margin-bottom: 2px; border-bottom: 1px solid #7f8c8d; padding-bottom: 4px;';
                menu.appendChild(header);

                menu.style.display = 'flex';
                
                let cellEl = cells[r][c];
                let rect = cellEl.getBoundingClientRect();
                
                let menuX = rect.right + 10;
                let menuY = rect.top;
                
                menu.style.left = menuX + 'px';
                menu.style.top = menuY + 'px';

                piecesInCell.forEach(p => {
                    let btn = document.createElement('button');
                    btn.className = 'selector-btn';
                    btn.innerHTML = `<span style="font-size: 24px;">${p.icon}</span> <span>${p.type}</span>`;
                    
                    btn.onclick = (e) => {
                        menu.style.display = 'none';
                        selectedPieceId = p.id;
                        renderPieces();
                        updateVision();
                        showValidMoves(p);
                    };
                    menu.appendChild(btn);
                });

                setTimeout(() => {
                    let mRect = menu.getBoundingClientRect();
                    if (mRect.right > window.innerWidth) {
                        menu.style.left = (rect.left - mRect.width - 10) + 'px'; 
                    }
                    if (mRect.bottom > window.innerHeight) {
                        menu.style.top = (window.innerHeight - mRect.height - 10) + 'px'; 
                    }
                }, 0);
            }

            document.addEventListener('click', (e) => {
                let menu = document.getElementById('piece-selector-menu');
                if (menu && menu.style.display === 'flex' && !menu.contains(e.target) && !e.target.closest('.cell') && !e.target.closest('.action-btn')) {
                    menu.style.display = 'none';
                }
            });

            function handleCellClick(e, r, c) {
                if (isReplaying || isGameOver || document.getElementById('promo-overlay')) return; 
                if (currentTurn !== localPlayerRole) return;

                let menu = document.getElementById('piece-selector-menu');
                if (menu && menu.style.display === 'flex') {
                    menu.style.display = 'none'; 
                }

                let myPiecesAtCell = pieces.filter(p => p.r === r && p.c === c && p.player === localPlayerRole && !p.isDead);
                let enemyPiecesAtCell = pieces.filter(p => p.r === r && p.c === c && p.player !== localPlayerRole && !p.isDead);
                let currentSelected = pieces.find(p => p.id === selectedPieceId);

                let isBlindFire = !enemyPiecesAtCell.length && myPiecesAtCell.length === 0 && currentSelected && currentSelected.type === 'BắnĐá' && currentSelected.cannonMode && unlockedTechs[localPlayerRole]?.includes('cannon');

                if (currentSelected && (r !== currentSelected.r || c !== currentSelected.c) && (myPiecesAtCell.length === 0 || myPiecesAtCell.some(p => !p.carriedBy))) {
                    let isAttack = enemyPiecesAtCell.length > 0;
                    let targetEnemy = enemyPiecesAtCell.find(p => p.carriedBy == null) || enemyPiecesAtCell[0]; 
                    let targetFriendly = myPiecesAtCell.find(p => !p.carriedBy && p.id !== currentSelected.id);

                    if (isAttack && isValidAction(currentSelected, r, c, true)) {
                        executeMove(currentSelected, r, c, true, targetEnemy);
                        return;
                    } else if (isBlindFire && isValidAction(currentSelected, r, c, true)) { 
                        executeMove(currentSelected, r, c, true, null);
                        return;
                    } else if (!isAttack && targetFriendly && isValidAction(currentSelected, r, c, false)) {
                        executeMove(currentSelected, r, c, false, targetFriendly);
                        return;
                    } else if (!isAttack && myPiecesAtCell.length === 0 && isValidAction(currentSelected, r, c, false)) {
                         executeMove(currentSelected, r, c, false, null);
                         return;
                    }
                }

                if (myPiecesAtCell.length > 0) {
                    if (lockedPieceId) {
                        let lockedP = myPiecesAtCell.find(p => p.id === lockedPieceId);
                        if (lockedP) {
                             lockedP.extraMoveUsed = false;
                             lockedP.canDisembark = false;
                             lockedPieceId = null;
                             selectedPieceId = null;
                             
                             if (currentTurn === 'p2') {
                                 if (isFantasticMode) {
                                     weatherTurnsLeft--;
                                     if (weatherTurnsLeft <= 0) cycleWeather();
                                     else updateWeatherUI();
                                     playNeutralAI();
                                 }
                                 currentTurn = 'p1';
                             } else {
                                 currentTurn = 'p2';
                             }

                             updateTurnUI();
                             saveCurrentState();
                             syncGameToFirebase();
                             clearHighlights();
                             renderPieces();
                             updateVision();
                             if (gameMode === 'pve' && currentTurn !== localPlayerRole) setTimeout(() => playBotAI(), 800);
                        }
                        return; 
                    }

                    // Không chọn được quân bị hóa đá
                    let isPetrified = pieces.some(enemy => enemy.player !== localPlayerRole && enemy.player !== 'neutral' && !enemy.isDead && enemy.type === 'Medusa' && unlockedTechs[enemy.player]?.includes('medusaUp') && Math.max(Math.abs(enemy.r - r), Math.abs(enemy.c - c)) <= 1);
                    if (isPetrified) return;

                    if (myPiecesAtCell.length >= 3) {
                        showPieceSelector(myPiecesAtCell, r, c);
                    } else if (myPiecesAtCell.length === 2) {
                        let clickedPieceEl = e.target.closest('.piece');
                        if (clickedPieceEl && clickedPieceEl.dataset.id) {
                            selectedPieceId = clickedPieceEl.dataset.id;
                        } else {
                            let carrier = myPiecesAtCell.find(p => !p.carriedBy);
                            selectedPieceId = carrier ? carrier.id : myPiecesAtCell[0].id;
                        }
                        renderPieces();
                        updateVision(); 
                        let selectedP = pieces.find(x => x.id === selectedPieceId);
                        if (selectedP) showValidMoves(selectedP); 
                    } else {
                        selectedPieceId = myPiecesAtCell[0].id;
                        renderPieces();
                        updateVision(); 
                        showValidMoves(myPiecesAtCell[0]); 
                    }
                } else {
                    if (!lockedPieceId) {
                        selectedPieceId = null;
                        clearHighlights();
                        renderPieces();
                        updateVision();
                    }
                }
            }

            function executeMove(movingPiece, r, c, isAttack, targetPiece) {
                if (movingPiece.r !== r || movingPiece.c !== c) {
                    movingPiece.buildProgress = 0;
                }

                if (isFantasticMode && currentWeather === 'Mưa' && !isAttack && !targetPiece && Math.random() < 0.4) {
                    let dr = Math.sign(r - movingPiece.r); let dc = Math.sign(c - movingPiece.c);
                    let slipAmt = Math.random() < 0.5 ? 1 : -1;
                    let sr = r + (dr * slipAmt); let sc = c + (dc * slipAmt);
                    if (sr>=0 && sr<ROWS && sc>=0 && sc<COLS && getEffectiveTerrain(sr,sc) !== 'ocean' && !hasPieceAt(sr, sc)) {
                        r = sr; c = sc;
                    }
                }

                if (movingPiece.canDisembark) {
                    clearHighlights();
                    movingPiece.hasMoved = true;
                    deadVisions.forEach(dv => { dv.turnsLeft--; });
                    deadVisions = deadVisions.filter(dv => dv.turnsLeft > 0);
                    
                    movingPiece.carriedBy = null;
                    movePieceAndPassengers(movingPiece.id, r, c);
                    movingPiece.canDisembark = false;
                    
                    selectedPieceId = null;
                    updateVision();
                    
                    let isPromoting = false;
                    if (movingPiece.type === 'Tốt') {
                        if (movingPiece.player === 'p1' && movingPiece.r === 0) isPromoting = true;
                        else if (movingPiece.player === 'p2' && movingPiece.r === ROWS - 1) isPromoting = true;
                    }
                    if (isPromoting && !isGameOver) {
                        if (movingPiece.player === localPlayerRole) {
                            showPromotionUI(movingPiece);
                            return; 
                        } else if (gameMode === 'pve') {
                            movingPiece.type = 'Hậu'; movingPiece.icon = '♛'; movingPiece.vision = 8;
                            finalizeTurn(movingPiece); return;
                        }
                    }
                    if (!isGameOver) finalizeTurn(movingPiece);
                    return;
                }

                clearHighlights(); 
                movingPiece.hasMoved = true;
                const transports = ['Tàu', 'Xe', 'Mã', 'Tháp', 'HọcViện', 'VoiChiến'];

                deadVisions.forEach(dv => { dv.turnsLeft--; });
                deadVisions = deadVisions.filter(dv => dv.turnsLeft > 0);

                let carrierT = movingPiece.carriedBy ? pieces.find(p => p.id === movingPiece.carriedBy) : null;
                let isBishopInTower = movingPiece.type === 'Tượng' && carrierT && ['Tháp', 'HọcViện'].includes(carrierT.type);
                let isBishopInPort = movingPiece.type === 'Tượng' && getEffectiveTerrain(movingPiece.r, movingPiece.c) === 'port';
                let targetIsWater = targetPiece ? (getEffectiveTerrain(targetPiece.r, targetPiece.c) === 'ocean' || getEffectiveTerrain(targetPiece.r, targetPiece.c) === 'river') : false;
                let isSwap = (isBishopInTower || isBishopInPort) && !isAttack && targetPiece && targetPiece.player === movingPiece.player && targetPiece.type !== 'Tháp' && targetPiece.type !== 'HọcViện' && targetPiece.id !== movingPiece.carriedBy && !targetIsWater;

                if (targetPiece && targetPiece.player === 'neutral' && targetPiece.type !== 'CáMập') {
                    if (unlockedTechs[movingPiece.player]?.includes('tame')) {
                        targetPiece.player = movingPiece.player;
                        if (targetPiece.type === 'Chim') { targetPiece.type = 'ĐạiBàng'; targetPiece.icon = '🦅'; targetPiece.vision = 3; }
                        if (targetPiece.type === 'Ngựa') { targetPiece.type = 'Mã'; targetPiece.icon = '♘'; targetPiece.vision = 3; }
                        if (targetPiece.type === 'Sói') { targetPiece.type = 'SóiHoàngGia'; targetPiece.icon = '🐺'; targetPiece.vision = 3; }
                        if (targetPiece.type === 'Voi') { targetPiece.type = 'VoiChiến'; targetPiece.icon = '🐘'; targetPiece.vision = 3; }
                        if (targetPiece.type === 'RắnChúa') { targetPiece.type = 'Medusa'; targetPiece.icon = '🧟‍♀️'; targetPiece.vision = 3; }
                        if (targetPiece.type === 'Chó') { targetPiece.type = 'ChóHoàngGia'; targetPiece.icon = '🐕'; targetPiece.vision = 3; }
                        
                        movingPiece.hasMoved = true;
                        finalizeTurn(movingPiece);
                        return;
                    } else {
                        killPieceAndPassengers(targetPiece.id);
                        movePieceAndPassengers(movingPiece.id, r, c);
                        movingPiece.hasMoved = true;
                        finalizeTurn(movingPiece);
                        return;
                    }
                }

                let triggerExplosion = false;
                let explosionR, explosionC;

                let isShoreAttack = false;
                let effType = movingPiece.type;
                if (isFantasticMode && movingPiece.infected && currentWeather === 'TrăngMáu' && unlockedTechs[movingPiece.player]?.includes('werewolf')) effType = 'NgườiSói';

                if (isAttack && targetPiece && targetPiece.type === 'Tàu' && ['ocean', 'river'].includes(getEffectiveTerrain(targetPiece.r, targetPiece.c))) {
                    if (!['Tàu', 'ĐạiBàng', 'BắnĐá', 'Chim', 'NgườiSói'].includes(effType)) {
                        if (Math.max(Math.abs(movingPiece.r - targetPiece.r), Math.abs(movingPiece.c - targetPiece.c)) === 1) {
                            isShoreAttack = true;
                        }
                    }
                }

                if (isAttack && effType === 'VoiChiến') {
                    let dist = Math.max(Math.abs(movingPiece.r - targetPiece.r), Math.abs(movingPiece.c - targetPiece.c));
                    if (dist > 4) {
                        killPieceAndPassengers(targetPiece.id);
                        showExplosion(targetPiece.r, targetPiece.c);
                        movingPiece.hasMoved = true;
                        finalizeTurn(movingPiece);
                        return;
                    }
                }

                if (isAttack && effType === 'Voi') {
                    let dist = Math.max(Math.abs(movingPiece.r - targetPiece.r), Math.abs(movingPiece.c - targetPiece.c));
                    if (dist > 3) {
                        killPieceAndPassengers(targetPiece.id);
                        showExplosion(targetPiece.r, targetPiece.c);
                        movingPiece.hasMoved = true;
                        finalizeTurn(movingPiece);
                        return;
                    }
                }

                if (isSwap) {
                    let towerId = movingPiece.carriedBy;
                    let targetOldR = targetPiece.r;
                    let targetOldC = targetPiece.c;
                    let targetCarriedBy = targetPiece.carriedBy;
                    
                    targetPiece.r = movingPiece.r; 
                    targetPiece.c = movingPiece.c;
                    targetPiece.carriedBy = towerId;
                    
                    movingPiece.r = targetOldR;
                    movingPiece.c = targetOldC;
                    movingPiece.carriedBy = targetCarriedBy;
                    
                    let passenger = pieces.find(p => p.carriedBy === targetPiece.id && !p.isDead);
                    if (passenger) movePieceAndPassengers(passenger.id, targetPiece.r, targetPiece.c);
                    
                    let myPassenger = pieces.find(p => p.carriedBy === movingPiece.id && !p.isDead);
                    if (myPassenger) movePieceAndPassengers(myPassenger.id, movingPiece.r, movingPiece.c);
                }
                else if (!isAttack && targetPiece && transports.includes(targetPiece.type) && targetPiece.player === movingPiece.player) {
                    movingPiece.carriedBy = targetPiece.id;
                    movePieceAndPassengers(movingPiece.id, targetPiece.r, targetPiece.c);
                } else {
                    if (isAttack) {
                        if (!targetPiece && effType === 'BắnĐá' && unlockedTechs[movingPiece.player]?.includes('cannon')) {
                            showExplosion(r, c);
                            deadVisions.push({ r: r, c: c, radius: 2, player: movingPiece.player, turnsLeft: 2 }); 
                            movingPiece.hasMoved = true;
                            finalizeTurn(movingPiece);
                            return;
                        }

                        let isExplosiveTower = false;
                        let passengerToDrop = null;

                        if (targetPiece.type === 'Tháp' || targetPiece.type === 'HọcViện') {
                            if (targetPiece.type === 'HọcViện' && effType === 'PhápSư' && unlockedTechs[movingPiece.player]?.includes('superIntellect')) {
                                let choice = confirm("SIÊU TRÍ THỨC: Bấm OK để MƯỢN Học Viện địch, Cancel để PHÁ HỦY.");
                                if (choice) {
                                    movingPiece.carriedBy = targetPiece.id;
                                    movePieceAndPassengers(movingPiece.id, r, c);
                                    movingPiece.hasMoved = true;
                                    finalizeTurn(movingPiece);
                                    return; 
                                }
                            }

                            let passenger = pieces.find(p => p.carriedBy === targetPiece.id && !p.isDead);
                            if (passenger) {
                                if (passenger.type === 'ĐạiBàng') {
                                    passengerToDrop = passenger; 
                                } else if (passenger.type === 'Tượng' || passenger.type === 'BắnĐá') {
                                    triggerExplosion = true; 
                                    explosionR = targetPiece.r;
                                    explosionC = targetPiece.c;
                                    isExplosiveTower = true;
                                }
                            }
                            if (!isExplosiveTower && targetPiece.type === 'Tháp') destroyedTowers.push({ id: targetPiece.id, player: targetPiece.player, r: targetPiece.r, c: targetPiece.c });
                        }

                        killPieceAndPassengers(targetPiece.id);

                        if (passengerToDrop && passengerToDrop.type === 'ĐạiBàng') {
                             passengerToDrop.isDead = false; 
                             passengerToDrop.carriedBy = null;
                             let dropC = targetPiece.c < 14 ? targetPiece.c - 1 : targetPiece.c + 1;
                             passengerToDrop.r = targetPiece.r; passengerToDrop.c = dropC;
                             let occupant = pieces.find(p => p.r === passengerToDrop.r && p.c === passengerToDrop.c && !p.isDead && !p.carriedBy && p.id !== passengerToDrop.id);
                             if (occupant) killPieceAndPassengers(occupant.id);
                        }

                        showExplosion(r, c);

                        let radius = 0;
                        if (['ĐạiBàng', 'Hậu', 'Mã', 'NgườiSói', 'ChóHoàngGia', 'SóiHoàngGia'].includes(targetPiece.type)) radius = 3; 
                        else if (['Xe', 'Tàu', 'Tượng'].includes(targetPiece.type)) radius = 2; 
                        if (getEffectiveTerrain(r, c) === 'forest' && radius > 0) radius = radius === 3 ? 2 : 1;
                        if (radius > 0) deadVisions.push({ r: r, c: c, radius: radius, player: targetPiece.player, turnsLeft: 6 }); 

                        if (triggerExplosion) {
                            for (let er = explosionR - 1; er <= explosionR + 1; er++) {
                                for (let ec = explosionC - 1; ec <= explosionC + 1; ec++) {
                                    let victims = pieces.filter(p => p.r === er && p.c === ec && !p.isDead);
                                    victims.forEach(v => killPieceAndPassengers(v.id)); 
                                    if(er>=0 && er<ROWS && ec>=0 && ec<COLS) showExplosion(er, ec);
                                }
                            }
                        }

                        if (effType === 'PhápSư' && unlockedTechs[movingPiece.player]?.includes('attack2')) {
                            deadVisions.push({ r: r, c: c, radius: 1, player: movingPiece.player, turnsLeft: 2 }); 
                        }
                        if (effType === 'BắnĐá') {
                            if (unlockedTechs[movingPiece.player]?.includes('cannon')) {
                                deadVisions.push({ r: r, c: c, radius: 2, player: movingPiece.player, turnsLeft: 2 }); 
                            } else if (unlockedTechs[movingPiece.player]?.includes('flare')) {
                                deadVisions.push({ r: r, c: c, radius: 1, player: movingPiece.player, turnsLeft: 2 }); 
                            }
                        }

                        if (['BắnĐá', 'Tàu', 'PhápSư'].includes(effType) || isShoreAttack) {
                             // Đứng yên
                        } else {
                            if (movingPiece.carriedBy) movingPiece.carriedBy = null; 
                            movePieceAndPassengers(movingPiece.id, r, c);
                        }
                    } else {
                        if (movingPiece.carriedBy) movingPiece.carriedBy = null; 
                        movePieceAndPassengers(movingPiece.id, r, c);
                    }
                }

                if (effType === 'Hậu' && !movingPiece.carriedBy) {
                    let ruinIdx = destroyedTowers.findIndex(dt => dt.r === movingPiece.r && dt.c === movingPiece.c && dt.player === movingPiece.player);
                    if (ruinIdx !== -1) {
                        let revivedTower = pieces.find(p => p.id === destroyedTowers[ruinIdx].id);
                        if (revivedTower) {
                            revivedTower.isDead = false;
                            revivedTower.r = movingPiece.r;
                            revivedTower.c = movingPiece.c;
                            movingPiece.carriedBy = revivedTower.id; 
                        }
                        destroyedTowers.splice(ruinIdx, 1);
                    }
                }

                selectedPieceId = null;
                updateVision();

                // Logic Nhường Ngôi
                let p1King = pieces.find(p => p.type === 'Vua' && p.player === 'p1');
                if (p1King && p1King.isDead) {
                    if (unlockedTechs.p1.includes('usurp') && !hasUsurped.p1) {
                        let candidates = pieces.filter(p => p.player === 'p1' && !p.isDead && p.type !== 'Tháp' && p.type !== 'HọcViện');
                        if (candidates.length > 0) {
                            let heir = candidates[Math.floor(Math.random() * candidates.length)];
                            heir.type = 'Vua'; heir.icon = '♔'; heir.vision = 2;
                            p1King.isDead = false; 
                            hasUsurped.p1 = true;
                            alert("👑 Vua Đỏ đã chết, nhưng một người khác đã kế vị!");
                        } else { isGameOver = true; }
                    } else { isGameOver = true; }
                }

                let p2King = pieces.find(p => p.type === 'Vua' && p.player === 'p2');
                if (p2King && p2King.isDead) {
                    if (unlockedTechs.p2.includes('usurp') && !hasUsurped.p2) {
                        let candidates = pieces.filter(p => p.player === 'p2' && !p.isDead && p.type !== 'Tháp' && p.type !== 'HọcViện');
                        if (candidates.length > 0) {
                            let heir = candidates[Math.floor(Math.random() * candidates.length)];
                            heir.type = 'Vua'; heir.icon = '♚'; heir.vision = 2;
                            p2King.isDead = false; 
                            hasUsurped.p2 = true;
                            alert("👑 Vua Đen đã chết, nhưng một người khác đã kế vị!");
                        } else { isGameOver = true; }
                    } else { isGameOver = true; }
                }

                if (isGameOver) {
                    saveCurrentState();
                    updateVision();
                    syncGameToFirebase();
                    document.getElementById('btn-replay').style.display = 'block';
                    let won = (p2King && p2King.isDead && localPlayerRole === 'p1') || (p1King && p1King.isDead && localPlayerRole === 'p2');
                    setTimeout(() => alert(won ? '🎉 CHIẾN THẮNG! Bạn đã tiêu diệt Vua địch!' : '💀 BẠN ĐÃ THUA! Vua của bạn đã bị tiêu diệt.'), 300);
                    return;
                }

                let isPromoting = false;
                if (effType === 'Tốt') {
                    if (movingPiece.player === 'p1' && movingPiece.r === 0) {
                        isPromoting = true;
                    } else if (movingPiece.player === 'p2' && movingPiece.r === ROWS - 1) {
                        isPromoting = true;
                    }
                }

                if (isPromoting && !isGameOver) {
                    if (movingPiece.player === localPlayerRole) {
                        showPromotionUI(movingPiece);
                        return; 
                    } else if (gameMode === 'pve') {
                        movingPiece.type = 'Hậu';
                        movingPiece.icon = '♛';
                        movingPiece.vision = 8;
                        finalizeTurn(movingPiece);
                        return;
                    }
                }

                if (!isGameOver) {
                    finalizeTurn(movingPiece);
                }
            }

            function finalizeTurn(movingPiece) {
                let hasExtraMove = false;
                let effType = movingPiece.type;
                if (isFantasticMode && movingPiece.infected && currentWeather === 'TrăngMáu' && unlockedTechs[movingPiece.player]?.includes('werewolf')) effType = 'NgườiSói';
                
                if (effType === 'Mã' && getEffectiveTerrain(movingPiece.r, movingPiece.c) === 'forest' && !movingPiece.extraMoveUsed) {
                    hasExtraMove = true; 
                    movingPiece.extraMoveUsed = true;
                } else if (effType === 'Tàu' && !movingPiece.extraMoveUsed) {
                    let passenger = pieces.find(p => p.carriedBy === movingPiece.id && !p.isDead);
                    if (passenger) {
                        let canDrop = false;
                        for(let dr = -1; dr <= 1; dr++) {
                            for(let dc = -1; dc <= 1; dc++) {
                                let nr = movingPiece.r + dr, nc = movingPiece.c + dc;
                                if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
                                    let t = getEffectiveTerrain(nr, nc);
                                    if(t !== 'ocean' && t !== 'river' && !hasPieceAt(nr, nc)) canDrop = true;
                                }
                            }
                        }
                        if (canDrop) {
                            passenger.canDisembark = true;
                            passenger.extraMoveUsed = true;
                            hasExtraMove = true;
                            movingPiece = passenger;
                        }
                    }
                } else {
                    movingPiece.extraMoveUsed = false;
                    movingPiece.canDisembark = false;
                }

                if (hasExtraMove) {
                    lockedPieceId = movingPiece.id;
                    if (currentTurn === localPlayerRole) {
                        if (movingPiece.canDisembark) {
                            turnInd.innerText = 'CHỌN Ô ĐỂ XUỐNG TÀU (BẤM VÀO QUÂN ĐỂ HỦY)';
                        } else {
                            turnInd.innerText = 'MÃ ĐƯỢC ĐI THÊM 1 BƯỚC (BẤM VÀO MÃ ĐỂ HỦY)';
                        }
                        turnInd.style.backgroundColor = '#f39c12';
                        selectedPieceId = movingPiece.id; 
                        updateVision();
                        showValidMoves(movingPiece);
                    }
                    saveCurrentState();
                    syncGameToFirebase(); 
                    
                    if (gameMode === 'pve' && currentTurn !== localPlayerRole) {
                        setTimeout(() => playBotAI(movingPiece.id), 800);
                    }
                } else {
                    lockedPieceId = null;
                    pieces.filter(p => p.player === currentTurn).forEach(p => p.extraMoveUsed = false);
                    
                    if (currentTurn === 'p2') {
                        if (isFantasticMode) {
                            weatherTurnsLeft--;
                            if (weatherTurnsLeft <= 0) cycleWeather();
                            else updateWeatherUI();
                        }
                        currentTurn = 'p1';
                    } else {
                        currentTurn = 'p2';
                    }
                    if (isFantasticMode) playNeutralAI(); // Cả p1 hay p2 đi xong Thú hoang đều nhảy vào hành động
                    
                    saveCurrentState();
                    updateTurnUI();
                    syncGameToFirebase(); 

                    if (gameMode === 'pve' && currentTurn !== localPlayerRole) {
                        setTimeout(() => playBotAI(), 800); 
                    }
                }
            }

            function playBotAI(forcedPieceId = null) {
                if (isGameOver || gameMode !== 'pve') return;
                
                let bots = pieces.filter(p => p.player === currentTurn && !p.isDead && !p.carriedBy && p.type !== 'Tháp');
                bots = bots.concat(pieces.filter(p => p.player === currentTurn && !p.isDead && p.carriedBy && p.type === 'PhápSư'));

                if (forcedPieceId) bots = bots.filter(p => p.id === forcedPieceId);
                
                let playerPs = pieces.filter(p => p.player === localPlayerRole && !p.isDead);
                let botVisionObj = calculateVisionMatrix(currentTurn);
                let botVision = botVisionObj.grid;
                let botStealth = botVisionObj.stealthGrid;
                let moves = [];

                bots.forEach(piece => {
                    let effType = piece.type;
                    if (isFantasticMode && piece.infected && currentWeather === 'TrăngMáu' && unlockedTechs[piece.player]?.includes('werewolf')) effType = 'NgườiSói';

                    let limit = (effType === 'BắnĐá' || effType === 'Xe') ? 10 : (effType === 'Tàu' ? 8 : 7);
                    if (effType === 'PhápSư') limit = 8;
                    
                    let inForest = getEffectiveTerrain(piece.r, piece.c) === 'forest';
                    let canWrap = ['Tốt', 'Mã', 'Medusa'].includes(effType) && inForest;
                    let carrierT = piece.carriedBy ? pieces.find(p => p.id === piece.carriedBy) : null;
                    let isBishopInTower = effType === 'Tượng' && carrierT && ['Tháp', 'HọcViện'].includes(carrierT.type);

                    let minC = Math.max(0, piece.c - limit);
                    let maxC = Math.min(COLS - 1, piece.c + limit);
                    let minR = Math.max(0, piece.r - limit);
                    let maxR = Math.min(ROWS - 1, piece.r + limit);

                    if (canWrap || isBishopInTower) { minC = 0; maxC = COLS - 1; }
                    if (isBishopInTower) { minR = 0; maxR = ROWS - 1; }
                    
                    for (let r = minR; r <= maxR; r++) {
                        for (let c = minC; c <= maxC; c++) {
                            if (r === piece.r && c === piece.c) continue;

                            let target = pieces.find(p => p.r === r && p.c === c && !p.isDead);
                            let isA = target && target.player !== currentTurn;

                            if (isA && target.player === localPlayerRole && ['Tốt', 'Mã', 'Medusa'].includes(target.type) && getEffectiveTerrain(target.r, target.c) === 'forest') {
                                if (!botStealth[target.r][target.c]) continue; 
                            }

                            if (target && target.player === currentTurn) {
                                if (isValidAction(piece, r, c, false, botVision)) {
                                    let score = 35;
                                    if (isBishopInTower && target.type !== 'Tháp' && target.type !== 'HọcViện') score += 25; 
                                    moves.push({ piece, r, c, targetPiece: target, score: score, isAttack: false });
                                }
                                continue;
                            }

                            if (isValidAction(piece, r, c, isA, botVision)) {
                                let score = isA ? (PIECE_VALUES[target.type] * 3) : (currentTurn==='p2'? r * 3 : (ROWS-r)*3);
                                
                                if (getEffectiveTerrain(r, c) === 'hill' && (effType === 'BắnĐá' || effType === 'ĐạiBàng')) score += 60;
                                if (getEffectiveTerrain(r, c) === 'forest' && (effType === 'Tốt' || effType === 'Mã')) score += 40;

                                if (effType === 'Hậu' && !isA) {
                                    let isRuin = destroyedTowers.some(dt => dt.r === r && dt.c === c && dt.player === piece.player);
                                    if (isRuin) score += 300; 
                                }

                                let isDanger = playerPs.some(pp => Math.max(Math.abs(pp.r - r), Math.abs(pp.c - c)) <= 10 && isValidAction(pp, r, c, true));
                                if (isDanger) score -= (PIECE_VALUES[piece.type] * 2);

                                moves.push({ piece, r, c, targetPiece: target, score, isAttack: isA });
                            }
                        }
                    }
                });

                bots.forEach(piece => {
                    if (playerPs.some(pp => Math.max(Math.abs(pp.r - piece.r), Math.abs(pp.c - piece.c)) <= 10 && isValidAction(pp, piece.r, piece.c, true))) {
                        if (PIECE_VALUES[piece.type] >= 100) {
                            moves.filter(m => m.piece.id === piece.id).forEach(m => m.score += 500);
                        }
                    }
                });

                if (moves.length > 0) {
                    moves.sort((a, b) => b.score - a.score);
                    let best = moves[0];
                    executeMove(best.piece, best.r, best.c, best.isAttack, best.targetPiece);
                } else {
                    if (forcedPieceId) {
                        let mp = pieces.find(p => p.id === forcedPieceId);
                        if(mp) { mp.extraMoveUsed = false; mp.canDisembark = false; }
                        lockedPieceId = null;
                        
                        if (currentTurn === 'p2') {
                            if (isFantasticMode) {
                                weatherTurnsLeft--;
                                if (weatherTurnsLeft <= 0) cycleWeather();
                                else updateWeatherUI();
                            }
                            currentTurn = 'p1';
                        } else {
                            currentTurn = 'p2';
                        }
                        if (isFantasticMode) playNeutralAI();

                        updateTurnUI();
                        updateVision();
                        return;
                    }

                    if (currentTurn === 'p2') {
                        if (isFantasticMode) {
                            weatherTurnsLeft--;
                            if (weatherTurnsLeft <= 0) cycleWeather();
                            else updateWeatherUI();
                        }
                        currentTurn = 'p1';
                    } else {
                        currentTurn = 'p2';
                    }
                    if (isFantasticMode) playNeutralAI();

                    updateTurnUI();
                    updateVision();
                }
            }

            function updateVision() {
    // Reset toàn bộ trạng thái sương mù về 'shrouded' (tối mờ) thay vì ẩn hoàn toàn
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            cells[r][c].classList.remove('visible');
            cells[r][c].classList.add('shrouded');
        }
    }

    let myVisionObj = calculateVisionMatrix(localPlayerRole);
    let grid = myVisionObj.grid;
    let stealthGrid = myVisionObj.stealthGrid;

    // Chỉ ô nào nằm trong tầm mắt mới xóa lớp phủ mờ (Visible)
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c]) {
                cells[r][c].classList.add('visible');
                cells[r][c].classList.remove('shrouded');
            }
        }
    }

    window.localStealthGrid = stealthGrid;
    renderPieces(); // Luôn render lại quân sau khi quét tầm nhìn
}

            window.addEventListener('beforeunload', function (e) {
                let isPlaying = document.getElementById('viewport').style.display === 'block';
                if (isPlaying && !isGameOver) {
                    e.preventDefault();
                    e.returnValue = ''; 
                }
            });
        </script>
